<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#c49530"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- T letterform -->
  <text x="12" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="url(#accent)" letter-spacing="-2">T</text>
  <!-- A letterform, slightly overlapping -->
  <text x="30" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#e8dcc8" letter-spacing="-2">A</text>
  <!-- Small pen stroke accent -->
  <line x1="48" y1="14" x2="52" y2="10" stroke="#d4a843" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="10" x2="53" y2="8" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round"/>
</svg>
