  // Show spinner on proxy button when translate/rewrite is in flight
  var _isTranslateOrRewrite = typeof url === "string" && (url.includes("/api/translate") || url.includes("/api/rewrite")) && opts.method && opts.method.toUpperCase() === "POST";
  if (_isTranslateOrRewrite) {
    var _proxy = document.getElementById('ta-proxy-translate-btn');
    if (_proxy) {
      _proxy._savedHTML = _proxy.innerHTML;
      _proxy.setAttribute('data-ta-spinning', '1');
      _proxy.disabled = true;
      _proxy.style.opacity = '0.7';
      var _isFr = (window.__taLang || 'en') === 'fr';
      var _svgSpin = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:ta-spin 0.8s linear infinite;flex-shrink:0"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> ';
      if (url.includes('/api/rewrite')) {
        _proxy.innerHTML = _svgSpin + (_isFr ? 'Polissage stylistique...' : 'Polishing style...');
      } else {
        // Translation phase: show progressive stages
        _proxy.innerHTML = _svgSpin + (_isFr ? 'Recherche terminologique...' : 'Searching terminology...');
        _proxy._phaseTimers = [
          setTimeout(function() { if (_proxy.hasAttribute('data-ta-spinning')) _proxy.innerHTML = _svgSpin + (_isFr ? 'Interrogation de TERMIUM Plus...' : 'Querying TERMIUM Plus...'); }, 3000),
          setTimeout(function() { if (_proxy.hasAttribute('data-ta-spinning')) _proxy.innerHTML = _svgSpin + (_isFr ? 'Consultation de Linguee...' : 'Consulting Linguee...'); }, 8000),
          setTimeout(function() { if (_proxy.hasAttribute('data-ta-spinning')) _proxy.innerHTML = _svgSpin + (_isFr ? 'Validation terminologique...' : 'Validating terminology...'); }, 13000),
          setTimeout(function() { if (_proxy.hasAttribute('data-ta-spinning')) _proxy.innerHTML = _svgSpin + (_isFr ? 'Traduction en cours...' : 'Translating...'); }, 18000)
        ];
      }
    }
  }
  // Inject direction into translate requests and capture translation result
  if (typeof url === "string" && url.includes("/api/translate") && opts.body) {
    try {
      var _tb = JSON.parse(opts.body);
      if (!_tb.direction) { _tb.direction = window.__taDirection || "en-fr"; opts.body = JSON.stringify(_tb); }
    } catch(e) {}
  }
  // Inject style + direction into rewrite requests; swap text for FR->EN
  if (typeof url === "string" && url.includes("/api/rewrite") && opts.body) {
    try {
      var _rb = JSON.parse(opts.body);
      if (!_rb.style) {
        var _st = window.__taStyle || "textAppeal";
        _rb.style = _st;
        if (_st === "other" && window.__taStyleOtherText) {
          _rb.customStyleText = window.__taStyleOtherText;
        }
      }
      if (!_rb.direction) { _rb.direction = window.__taDirection || "en-fr"; }
      opts.body = JSON.stringify(_rb);
    } catch(e) {}
  }
  // Gate: require login for translate/rewrite
  if (window.__taRequireLogin && typeof url === "string" && (url.includes("/api/translate") || url.includes("/api/rewrite"))) {
    window.__taFreemium.showAuthModal();
    // Remove spinner since we're not actually making the request
    var _p2 = document.getElementById('ta-proxy-translate-btn');
    if (_p2 && _p2._savedHTML) { if (_p2._phaseTimers) _p2._phaseTimers.forEach(clearTimeout); _p2.removeAttribute('data-ta-spinning'); _p2.innerHTML = _p2._savedHTML; _p2.disabled = false; _p2.style.opacity = '1'; }
    return Promise.resolve(new Response(JSON.stringify({error: "Login required"}), {status: 401, headers: {"Content-Type": "application/json"}}));
  }

  // Capture admin token from outgoing requests
  if (opts.headers && typeof url === "string" && url.startsWith("/api/admin")) {
    const at = opts.headers instanceof Headers ? opts.headers.get("x-admin-token") : opts.headers["x-admin-token"];
    if (at) capturedAdminToken = at;
  }
  return origFetch.call(this, url, opts).then(function(resp) {
    // Remove spinner from proxy button when translate/rewrite completes
    if (_isTranslateOrRewrite) {
      var _p3 = document.getElementById('ta-proxy-translate-btn');
      if (_p3) { if (_p3._phaseTimers) _p3._phaseTimers.forEach(clearTimeout); _p3.removeAttribute('data-ta-spinning'); if (_p3._savedHTML) { _p3.innerHTML = _p3._savedHTML; } _p3.disabled = false; _p3.style.opacity = '1'; }
    }
    // Capture admin token from login response
    if (typeof url === "string" && url.includes("/api/admin/login") && resp.ok) {
      resp.clone().json().then(function(data) {
        if (data.token) capturedAdminToken = data.token;
      });
    }
    // Intercept translate response to capture translation + web terminology
    if (typeof url === "string" && url.includes("/api/translate") && resp.ok) {
      resp.clone().json().then(function(data) {
        // Store the translation result for the rewrite step
        window.__taLastTranslation = data.translation || '';
        window.__taLocalTMEnabled = data.localTMEnabled !== false;
        window.__taWebTerms = (data.webTermSuggestions && data.webTermSuggestions.length > 0) ? data.webTermSuggestions : [];
        console.log('Web terms received:', window.__taWebTerms.length, 'localTM:', window.__taLocalTMEnabled);
        // Render immediately and also with delays to catch React re-renders
        renderWebTermSuggestions();
        updateTMPaneVisibility();
        setTimeout(function() { renderWebTermSuggestions(); updateTMPaneVisibility(); }, 300);
        setTimeout(function() { renderWebTermSuggestions(); updateTMPaneVisibility(); }, 1000);
        setTimeout(function() { renderWebTermSuggestions(); updateTMPaneVisibility(); }, 2000);
        // Fetch full principle catalogue for current style (used as cross-reference after rewrite)
        if (!window.__taAllPrinciples || window.__taAllPrinciples.length === 0) {
          if (typeof __refreshPrinciples === 'function') __refreshPrinciples();
        }
      }).catch(function(e) { console.warn('Web terms intercept error:', e); });
    }
    // Intercept rewrite response to capture applied principles
    if (typeof url === "string" && url.includes("/api/rewrite") && resp.ok) {
      resp.clone().json().then(function(data) {
        var _rawIds = data.appliedPrinciples || [];
        // Deduplicate — LLM sometimes returns the same principle number twice
        var _seen = {};
        var ids = _rawIds.filter(function(id) { if (_seen[id]) return false; _seen[id] = true; return true; });
        window.__taAppliedIds = ids;
        // Cross-reference with full principle catalogue to get names + explanations
        var allP = window.__taAllPrinciples || [];
        if (allP.length > 0 && ids.length > 0) {
          var idSet = {};
          ids.forEach(function(id) { idSet[id] = true; });
          window.__taPrinciplesData = allP.filter(function(p) { return idSet[p.id]; });
        } else if (ids.length > 0) {
          // Fallback: build minimal entries from IDs alone (no names yet)
          window.__taPrinciplesData = ids.map(function(id) { return { id: id, name: '', explanation: '' }; });
          // Fetch the full list to get names
          if (typeof __refreshPrinciples === 'function') __refreshPrinciples();
        } else {
          window.__taPrinciplesData = [];
        }
        window.dispatchEvent(new CustomEvent('ta-principles-updated', { detail: window.__taPrinciplesData }));
      }).catch(function(e) { console.warn('Rewrite intercept error:', e); });
    }
    // Intercept 402 (limit reached) responses
    if (resp.status === 402) {
      resp.clone().json().then(function(data) {
        if (data.error === "limit_reached") {
          showUpgradeModal(data);
        }
      });
    }
    return resp;
  }).catch(function(err) {
    // Remove spinner on network error too
    if (_isTranslateOrRewrite) {
      var _p4 = document.getElementById('ta-proxy-translate-btn');
      if (_p4) { if (_p4._phaseTimers) _p4._phaseTimers.forEach(clearTimeout); _p4.removeAttribute('data-ta-spinning'); if (_p4._savedHTML) { _p4.innerHTML = _p4._savedHTML; } _p4.disabled = false; _p4.style.opacity = '1'; }
    }
    throw err;
  });
};

// ═══ Load freemium config ═══
async function loadConfig() {
  try {
    const r = await origFetch("/api/freemium-config");
    if (r.ok) freemiumConfig = await r.json();
  } catch(e) {}
}

// ═══ Check session ═══
async function checkSession() {
  const token = getToken();
  if (!token) { currentUser = null; updateUI(); return; }
  try {
    const r = await origFetch("/api/user/me", { headers: { "x-user-token": token } });
    if (r.ok) {
      currentUser = await r.json();
    } else {
      setToken(null);
      currentUser = null;
    }
  } catch(e) {
    currentUser = null;
  }
  updateUI();
}

// ═══ Auth Actions ═══
async function doRegister(email, password, name) {
  const r = await origFetch("/api/user/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password, displayName: name })
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || "Registration failed");
  setToken(data.token);
  currentUser = data.user;
  updateUI();
  return data;
}

async function doLogin(email, password) {
  const r = await origFetch("/api/user/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || "Login failed");
  setToken(data.token);
  currentUser = data.user;
  updateUI();
  return data;
}

async function doLogout() {
  const token = getToken();
  if (token) {
    try { await origFetch("/api/user/logout", { method: "POST", headers: { "x-user-token": token } }); } catch(e) {}
  }
  setToken(null);
  currentUser = null;
  updateUI();
}

async function doSubscribe() {
  const token = getToken();
  if (!token) { showAuthModal("login"); return; }
  try {
    const r = await origFetch("/api/user/subscribe", { method: "POST", headers: { "x-user-token": token, "Content-Type": "application/json" } });
    const data = await r.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      alert(data.error || "Subscription unavailable at this time");
    }
  } catch(e) {
    alert("Subscription service error: " + e.message);
  }
}

function renderUsageCounter() {
  let counter = document.getElementById("ta-usage-counter");
  if (!currentUser) {
    if (counter) counter.remove();
    return;
  }
  if (!counter) {
    counter = document.createElement("div");
    counter.id = "ta-usage-counter";
    document.body.appendChild(counter);
  }
  const used = currentUser.requestsThisMonth || 0;
  const limit = currentUser.freeLimit || freemiumConfig.freeRequestsPerMonth || 30;
  const isPro = currentUser.plan === "pro" || currentUser.plan === "admin_free" || currentUser.subscriptionStatus === "active";
  const pct = isPro ? 0 : Math.min(100, Math.round((used / limit) * 100));
  const barColor = pct > 80 ? "#ef4444" : pct > 50 ? "#f59e0b" : "#10b981";

  counter.innerHTML = '<div class="ta-usage-inner">' +
    '<span class="ta-usage-label">' + (isPro ? __t("proUnlimited") : used + " / " + limit + " " + __t("freeRequestsOf")) + '</span>' +
    (isPro ? '' : '<div class="ta-usage-bar"><div class="ta-usage-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>') +
    '</div>';
}

    '<form id="ta-auth-form" onsubmit="return false;">' +
    (isRegister ? '<div class="ta-form-group"><label>' + __t('name') + '</label><input type="text" id="ta-auth-name" placeholder="' + __t('yourName') + '" autocomplete="name"></div>' : '') +
    '<div class="ta-form-group"><label>' + __t('email') + '</label><input type="email" id="ta-auth-email" placeholder="you@example.com" required autocomplete="email"></div>' +
    '<div class="ta-form-group"><label>' + __t('password') + '</label><input type="password" id="ta-auth-pass" placeholder="' + __t('minChars') + '" required minlength="6" autocomplete="' + (isRegister ? "new-password" : "current-password") + '"></div>' +
    '<div id="ta-auth-error" class="ta-auth-error" style="display:none"></div>' +
    '<button type="submit" class="ta-btn ta-btn-primary ta-btn-full" id="ta-auth-submit">' + (isRegister ? __t('createAccount') : __t('logIn')) + '</button>' +
    '</form>' +
    '<div class="ta-modal-switch">' +
    (isRegister
      ? __t('alreadyHaveAccount') + ' <a href="#" onclick="window.__taFreemium.showAuthModal(\'login\');return false;">' + __t('logInLink') + '</a>'
      : __t('noAccount') + ' <a href="#" onclick="window.__taFreemium.showAuthModal(\'register\');return false;">' + __t('createOneFree') + '</a>' +
        '<br><a href="#" onclick="window.__taFreemium.showLostPasswordModal();return false;" style="font-size:13px;color:#64748b">' + (window.__taLang === "fr" ? "Mot de passe oubli\u00e9?" : "Forgot password?") + '</a>') +
    '</div>' +
    (isRegister ? '<div class="ta-modal-upgrade-hint">' + __t('wantUnlimited') + ' <a href="#" onclick="window.__taFreemium.showAuthModal(\'register\');return false;">' + __t('subscribeToPro') + ' $' + freemiumConfig.monthlyPriceCad + ' ' + __t('cadMo') + '</a> ' + __t('subscribeAfter') + '</div>' : '') +
    '</div>';

  document.body.appendChild(modal);
  modal.querySelector("#ta-auth-email").focus();

  // Handle submit
  modal.querySelector("#ta-auth-form").addEventListener("submit", async function(ev) {
    ev.preventDefault();
    const email = modal.querySelector("#ta-auth-email").value.trim();
    const pass = modal.querySelector("#ta-auth-pass").value;
    const name = isRegister ? (modal.querySelector("#ta-auth-name")?.value?.trim() || "") : "";
    const errEl = modal.querySelector("#ta-auth-error");
    const btn = modal.querySelector("#ta-auth-submit");
    errEl.style.display = "none";
    btn.disabled = true;
    btn.textContent = __t("pleaseWait");

    try {
      if (isRegister) {
        await doRegister(email, pass, name);
      } else {
        await doLogin(email, pass);
      }
      modal.remove();
    } catch(e) {
      errEl.textContent = e.message;
      errEl.style.display = "block";
      btn.disabled = false;
      btn.textContent = isRegister ? "Create Account" : "Log In";
    }
  });

  // Close on overlay click
  modal.addEventListener("click", function(ev) {
    if (ev.target === modal) modal.remove();
  });
}

// ═══ Admin: Members Tab ═══
function injectAdminSections() {
  // Watch for admin panel to load (after login)
  let injected = false;
  const observer = new MutationObserver(function() {
    if (injected) return;
    const hash = window.location.hash;
    if (!hash.includes("/admin")) { injected = false; return; }

    // Look for the admin content ("Change Admin Credentials" section)
    const allText = document.body.innerText;
    if (!allText.includes("Change Admin Credentials") && !allText.includes("LLM Configuration")) return;
    if (document.getElementById("ta-admin-sections")) return;
    injected = true;

    setTimeout(function() {
      // Find the main admin container - the outermost card container
      const cards = document.querySelectorAll('.shadcn-card, [class*="rounded-xl"][class*="border"]');
      let lastCard = null;
      for (const c of cards) {
        if (c.textContent.includes('Change Admin Credentials') || c.textContent.includes('Update Credentials')) {
          lastCard = c;
        }
      }

      const container = lastCard ? lastCard.parentElement : document.querySelector('[class*="space-y"]');
      if (!container) return;

      const sections = document.createElement('div');
      sections.id = 'ta-admin-sections';

            setTimeout(function() { spStatus.textContent = ''; }, 3000);

  observer.observe(document.body, { childList: true, subtree: true });

          '<td><select onchange="window.__taFreemium.updateMemberPlan(' + m.id + ',this.value)" class="ta-select">' +

}

async function initDb() {

    const r = await origFetch("/api/admin/db-init", {
      method: "POST",
      headers: { "x-admin-token": adminToken, "Content-Type": "application/json" }
    });
    const data = await r.json();
    if (msg) {
      const status = data.ok ? "Tables created successfully!" : (data.error || "Error");
      const debugInfo = data.debug ? "\n\nDIAGNOSTIC LOG:\n" + data.debug.join("\n") : "";
      msg.textContent = status + debugInfo;
      msg.style.color = data.ok ? "#10b981" : "#ef4444";
      msg.style.whiteSpace = "pre-wrap";
      msg.style.fontSize = "12px";
      msg.style.maxHeight = "300px";
      msg.style.overflowY = "auto";
    }
  } catch(e) {
    if (msg) { msg.textContent = "Error: " + e.message; msg.style.color = "#ef4444"; }
  }
}

// ═══ Cumulative Results + Scrollable + Footer Message ═══
// CRITICAL FIX: Never write to React-owned DOM nodes. The old approach
// overwrote innerHTML of [data-testid="text-first-version"] etc., which
// desynchronised React's virtual DOM and caused a blank-screen crash on
// subsequent renders (retranslate). The new strategy stores results in a
// plain JS array and renders them into the scrollable parent container
// using a non-React wrapper div, while keeping the React element hidden
// so React can reconcile freely without visual side-effects.
(function setupCumulativeResults() {
  var historyTrans = [];   // array of HTML strings (newest first)
  var historyRewrite = [];
  var lastTransHTML = "";
  var lastRewriteHTML = "";
  var HISTORY_TRANS_ID  = "ta-history-translation";
  var HISTORY_REWRITE_ID = "ta-history-rewrite";

  function getFooterMessage() {
    var L = window.__taLang || "en";
    if (L === "fr") {
      return '<div class="ta-result-footer" style="margin-top:12px;padding-top:10px;border-top:1px dashed rgba(128,128,128,0.3);font-size:12px;color:#888;line-height:1.5">' +
        "N'h\u00e9sitez pas \u00e0 cliquer sur Traduire / Retraduire pour obtenir plus de propositions. L'IA n'est pas infaillible. Pour un travail plus rigoureux, contactez " +
        '<a href="mailto:fcouture@traductionsvoila.com" style="color:#3b82f6;text-decoration:underline">fcouture@traductionsvoila.com</a>.' +
        '</div>';
    }
    return '<div class="ta-result-footer" style="margin-top:12px;padding-top:10px;border-top:1px dashed rgba(128,128,128,0.3);font-size:12px;color:#888;line-height:1.5">' +
      'Feel free to click on Translate / Retranslate for more propositions. AI is not infallible. For a more thorough job, contact ' +
      '<a href="mailto:fcouture@voilatranslations.com" style="color:#3b82f6;text-decoration:underline">fcouture@voilatranslations.com</a>.' +
      '</div>';
  }

  // Build the full cumulative HTML from the history array
  function renderHistory(arr) {
    var parts = [];
    for (var i = 0; i < arr.length; i++) {
      if (i > 0) parts.push('<hr style="border:none;border-top:1px dashed rgba(128,128,128,0.3);margin:12px 0">');
      parts.push('<div class="ta-result-entry">' + arr[i] + getFooterMessage() + '</div>');
    }
    return parts.join('');
  }

  // Find or create the history wrapper inside the scrollable parent.
  // The wrapper is a direct child of the .overflow-auto.custom-scroll div,
  // which is NOT a React-managed node (React manages the children inside it).
  function ensureHistoryContainer(scrollParent, id) {
    var c = document.getElementById(id);
    if (c && c.parentNode === scrollParent) return c;
    // Remove stale container if reparented
    if (c) c.remove();
    c = document.createElement('div');
    c.id = id;
    c.className = 'rich-text-output';
    c.contentEditable = 'true';
    c.style.outline = 'none';
    c.style.cursor = 'text';
    // Prepend so it appears at the top of the scrollable area
    if (scrollParent.firstChild) {
      scrollParent.insertBefore(c, scrollParent.firstChild);
    } else {
      scrollParent.appendChild(c);
    }
    return c;
  }

  function handlePanel(testId, historyArr, lastHTML, historyId) {
    var reactEl = document.querySelector('[data-testid="' + testId + '"]');
    if (!reactEl) return lastHTML;
    var currentHTML = reactEl.innerHTML;
    // Skip empty, unchanged, or spinner states
    if (!currentHTML || currentHTML === lastHTML) return lastHTML;
    if (currentHTML.indexOf('animate-spin') !== -1) return lastHTML;

    // New content arrived from React
    historyArr.unshift(currentHTML); // newest first

    // The scrollable parent is the .overflow-auto.custom-scroll div.
    // React owns this div but only manages a single child inside it.
    // We append our history container as an additional child; React's
    // reconciler won't touch DOM nodes it didn't create.
    var scrollParent = reactEl.closest('.overflow-auto');
    if (!scrollParent) scrollParent = reactEl.parentElement;

    var container = ensureHistoryContainer(scrollParent, historyId);
    container.innerHTML = renderHistory(historyArr);
    container.style.display = '';

    // Hide the React-owned result element so the user only sees our
    // cumulative history.  Do NOT hide spinners or placeholders.
    reactEl.style.display = 'none';

    scrollParent.style.overflowY = 'auto';
    scrollParent.style.scrollBehavior = 'smooth';

    return currentHTML;
  }

  // Debounced observer
  var pending = false;
  var observer = new MutationObserver(function() {
    if (pending) return;
    pending = true;
    requestAnimationFrame(function() {
      pending = false;

      lastTransHTML = handlePanel(
        'text-first-version', historyTrans, lastTransHTML, HISTORY_TRANS_ID
      );
      lastRewriteHTML = handlePanel(
        'text-appeal-version', historyRewrite, lastRewriteHTML, HISTORY_REWRITE_ID
      );

      // When React shows a spinner (loading state), the data-testid
      // element is unmounted and replaced with a spinner div.
      // Our history container must stay visible alongside the spinner.
      // Ensure the container's display is not accidentally hidden.
      [HISTORY_TRANS_ID, HISTORY_REWRITE_ID].forEach(function(hid) {
        var c = document.getElementById(hid);
        if (c && c.innerHTML) {
          c.style.display = '';
        }
      });
    });
  });

  function startObserving() {
    var root = document.getElementById('root');
    if (root) {
      observer.observe(root, { childList: true, subtree: true, characterData: true });
    } else {
      setTimeout(startObserving, 500);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startObserving);
  } else {
    startObserving();
  }
})();

// ═══ Initialize ═══
async function init() {
  await loadConfig();
  await checkSession();
  renderLangToggle();
  renderCreativitySlider();
  injectAdminSections();

  // Re-check on hash change (SPA navigation)
  window.addEventListener("hashchange", function() {
    updateUI();
  });

  // Update React text periodically and on DOM changes
  const _textObserver = new MutationObserver(function() {
    clearTimeout(window.__taTextTimeout);
    window.__taTextTimeout = setTimeout(__updateReactText, 300);
  });
  _textObserver.observe(document.getElementById("root") || document.body, { childList: true, subtree: true });

  // Periodically refresh usage counter
  setInterval(async function() {
    if (currentUser && getToken()) {
      try {
        const r = await origFetch("/api/user/me", { headers: { "x-user-token": getToken() } });
        if (r.ok) { currentUser = await r.json(); renderUsageCounter(); }
      } catch(e) {}
    }
  }, 60000);
}

// Wait for DOM
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}

})();

  function buildLeftPane() {
    var pane = document.createElement('div');
    pane.id = LEFT_ID;
    pane.style.cssText = CARD + 'justify-content:center;align-items:flex-start;gap:12px;';
    // Translate button placeholder (will be filled when we move the real button)
    var btnSlot = document.createElement('div');
    btnSlot.id = 'ta-btn-slot';
    pane.appendChild(btnSlot);
    // Contact message
    var msg = document.createElement('div');
    msg.style.cssText = 'display:flex;align-items:center;gap:10px;margin-top:4px;';
    if (photoSrc) {
      var img = document.createElement('img');
      img.src = photoSrc;
      img.style.cssText = 'width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;';
      msg.appendChild(img);
    }
    var txt = document.createElement('div');
    txt.style.cssText = 'font-size:11px;color:hsl(var(--muted-foreground));line-height:1.4;';
    txt.innerHTML = window.__taLang === 'fr'
      ? 'Pour une attention professionnelle, \xe9crivez \xe0 <a href="mailto:fcouture@traductionsvoila.com" style="color:hsl(var(--primary));text-decoration:underline;">fcouture@traductionsvoila.com</a>'
      : 'For full professional attention, contact Certified Translator <a href="mailto:fcouture@voilatranslations.com" style="color:hsl(var(--primary));text-decoration:underline;">fcouture@voilatranslations.com</a>';
    msg.appendChild(txt);
    pane.appendChild(msg);
    return pane;
  }

  var BOTTOM_H = 300; // px for bottom row (increased for web term suggestions)
  var BOTTOM_GAP = 8;  // margin-top

  function sizeGrid(grid, row) {
    var parent = grid.parentElement;
    if (!parent) return;
    var avail = parent.clientHeight;
    if (avail <= 0) return;
    var used = BOTTOM_H + BOTTOM_GAP;
    var gh = avail - used;
    if (gh < 200) gh = 200; // safety floor
    grid.style.setProperty('height', gh + 'px', 'important');
    grid.style.overflow = 'hidden';
  }

  function relocatePanels() {
    var grid = document.querySelector('.grid.lg\\:grid-cols-3') || document.querySelector('[class*="lg:grid-cols-3"]');
    if (!grid) return;

    var parent = grid.parentElement;

    // Find or create the bottom row
    var row = document.getElementById(ROW_ID);
    if (!row) {
      row = document.createElement('div');
      row.id = ROW_ID;
      row.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;height:' + BOTTOM_H + 'px;min-height:' + BOTTOM_H + 'px;max-height:' + BOTTOM_H + 'px;margin-top:' + BOTTOM_GAP + 'px;flex-shrink:0;';
      // Insert AFTER the grid
      if (grid.nextSibling) parent.insertBefore(row, grid.nextSibling);
      else parent.appendChild(row);
      // Create the left pane (button + contact)
      row.appendChild(buildLeftPane());
      // Render direction and style toggles into the left pane
      if(typeof renderDirectionToggle==="function")renderDirectionToggle();
      if(typeof renderStyleToggle==="function")renderStyleToggle();
    }

    // Re-render if not present (in case left pane was rebuilt)
    if (!document.getElementById('ta-direction-toggle')&&typeof renderDirectionToggle==='function') renderDirectionToggle();
    if (!document.getElementById('ta-style-toggle')&&typeof renderStyleToggle==='function') renderStyleToggle();

    // Explicitly size the grid in pixels
    sizeGrid(grid, row);

    // Safari fix: force min-height:0 on all flex-1 content divs inside columns
    var contentDivs = grid.querySelectorAll('.flex-1.overflow-auto');
    for (var c = 0; c < contentDivs.length; c++) {
      contentDivs[c].style.minHeight = '0';
    }

    // ── MIRROR (not move!) the Translate button into the left pane ──
    // CRITICAL: We must NEVER move React-owned DOM nodes out of React's
    // tree.  Doing so desynchronises the virtual DOM and causes a blank-
    // screen crash the next time React re-renders (e.g. on Retranslate).
    // Instead we: (a) hide the original in-grid elements with CSS, and
    // (b) maintain cloned / proxy elements in the bottom row.
    var btnBar = document.querySelector('[data-testid="button-translate"]');
    var btnSlot = document.getElementById('ta-btn-slot');
    if (btnBar && btnSlot) {
      // Hide the original button's wrapper inside the grid
      // Use visibility:hidden + zero size instead of display:none
      // because Safari won't fire .click() on elements inside display:none containers
      var origBtnWrapper = btnBar.closest('.border-t');
      if (origBtnWrapper) origBtnWrapper.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden;visibility:hidden;pointer-events:none;';

      // Create or update a PROXY button inside our bottom-left pane
      var proxyId = 'ta-proxy-translate-btn';
      var proxy = document.getElementById(proxyId);
      if (!proxy) {
        proxy = document.createElement('button');
        proxy.id = proxyId;
        proxy.style.cssText = 'display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid hsl(var(--border));background:hsl(var(--primary));color:hsl(var(--primary-foreground));cursor:pointer;font-weight:500;white-space:nowrap;';
        proxy.addEventListener('click', function() {
          // Forward click to the real React button
          var real = document.querySelector('[data-testid="button-translate"]');
          if (real) real.click();
        });
        btnSlot.innerHTML = '';
        btnSlot.appendChild(proxy);
      }
      // Mirror the label and disabled state from the real button
      // BUT skip if our spinner is active (don't overwrite spinner with React's content)
      if (!proxy.hasAttribute('data-ta-spinning')) {
        proxy.disabled = btnBar.disabled;
        proxy.style.opacity = btnBar.disabled ? '0.5' : '1';
        proxy.innerHTML = btnBar.innerHTML;
      }
    }

    // ── Create center column wrapper (always, regardless of TM state) ──
    var tmWrapperId = 'ta-mirror-tm-wrapper';
    var tmWrapper = document.getElementById(tmWrapperId);
    if (!tmWrapper) {
      tmWrapper = document.createElement('div');
      tmWrapper.id = tmWrapperId;
      tmWrapper.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;border-radius:8px;border:1px solid hsl(var(--border));background:hsl(var(--card));padding:0;';
      // Top sub-pane: Glossary + TM
      var tmTop = document.createElement('div');
      tmTop.id = 'ta-mirror-tm';
      tmTop.style.cssText = 'flex:1;min-height:0;overflow-y:auto;padding:10px 14px;';
      tmWrapper.appendChild(tmTop);
      // Bottom sub-pane: Web Terminology
      var tmBot = document.createElement('div');
      tmBot.id = 'ta-mirror-webterms';
      tmBot.style.cssText = 'flex:1;min-height:0;overflow-y:auto;padding:10px 14px;border-top:2px solid hsl(var(--border));';
      tmWrapper.appendChild(tmBot);
      if (row.children.length >= 2) {
        row.insertBefore(tmWrapper, row.children[1]);
      } else {
        row.appendChild(tmWrapper);
      }
    }

    // ── MIRROR TM/Glossary content into top sub-pane ──
    var tmMirror = document.getElementById('ta-mirror-tm');
    var tmWebPane = document.getElementById('ta-mirror-webterms');
    var _tmEnabled = window.__taLocalTMEnabled !== false;

    var tmHdr = document.querySelector('[data-testid="button-toggle-details"]');
    if (tmHdr) {
      var tmPanel = tmHdr.closest('.border-t');
      if (tmPanel) {
        tmPanel.style.display = 'none';
        if (tmMirror && _tmEnabled) {
          tmMirror.style.display = '';
          tmMirror.innerHTML = tmPanel.innerHTML;
        }
      }
    }
    // Hide TM pane when disabled
    if (tmMirror && !_tmEnabled) {
      tmMirror.style.display = 'none';
      tmMirror.innerHTML = '';
    }

    // ── Render web terminology in bottom sub-pane ──
    if (tmWebPane && window.__taWebTerms && window.__taWebTerms.length > 0) {
      tmWebPane.style.display = '';
      renderWebTermSuggestions_inPanel(tmWebPane);
    }

    // ── MIRROR Principles panel into bottom row ──
    var prHdr = document.querySelector('[data-testid="button-toggle-principles"]');
    if (prHdr) {
      var prPanel = prHdr.closest('.border-t');
      if (prPanel) {
        prPanel.style.display = 'none';
        var prMirrorId = 'ta-mirror-pr';
        var prMirror = document.getElementById(prMirrorId);
        if (!prMirror) {
          prMirror = document.createElement('div');
          prMirror.id = prMirrorId;
          prMirror.style.cssText = CARD + 'overflow-y:auto;';
          row.appendChild(prMirror);
        }
        // Build principles from API data (mirroring React HTML loses event handlers and hidden content)
        var _prData = window.__taPrinciplesData;
        if (_prData && _prData.length > 0) {
          // Build a fingerprint to avoid needless innerHTML rebuilds (which kill event handlers)
          var _prFingerprint = _prData.map(function(p){return p.id+':'+p.name}).join('|');
          if (prMirror.getAttribute('data-pr-fp') !== _prFingerprint) {
            var _prHtml = '<div style="padding:4px 0">';
            _prData.forEach(function(p, i) {
              var hasExp = p.explanation && p.explanation.trim();
              _prHtml += '<div style="cursor:pointer;display:flex;align-items:flex-start;gap:6px;padding:5px 8px;border-radius:6px" class="ta-pr-item" data-idx="' + i + '">' +
                '<span style="font-size:10px;padding:1px 5px;border-radius:4px;background:rgba(217,181,60,0.12);color:#b88f0a;border:1px solid rgba(217,181,60,0.25);white-space:nowrap;margin-top:1px">#' + p.id + '</span>' +
                '<span style="font-size:12px;font-weight:500;flex:1">' + p.name + '</span>' +
                (hasExp ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-top:3px;flex-shrink:0;transition:transform 0.2s;color:#888" class="ta-pr-chev"><path d="m6 9 6 6 6-6"/></svg>' : '') +
                '</div>' +
                (hasExp ? '<div class="ta-pr-exp" style="display:none;margin:0 8px 6px 36px;font-size:11px;color:#666;line-height:1.5;background:rgba(0,0,0,0.03);border-radius:6px;padding:6px 10px">' + p.explanation + '</div>' : '');
            });
            _prHtml += '</div>';
            var _prLabel = window.__taLang === 'fr'
              ? _prData.length + ' principes appliqu\u00e9s'
              : _prData.length + ' principles applied';
            prMirror.innerHTML = '<div style="font-size:13px;font-weight:600;padding:0 8px 6px">' +
              '<span style="color:#d9b53c">\u2728</span> ' + _prLabel + '</div>' + _prHtml;
            prMirror.setAttribute('data-pr-fp', _prFingerprint);
            // Use event delegation on the container so handlers survive any future innerHTML changes
            prMirror.onclick = function(ev) {
              var item = ev.target.closest('.ta-pr-item');
              if (!item) return;
              var exp = item.nextElementSibling;
              if (exp && exp.classList.contains('ta-pr-exp')) {
                var show = exp.style.display === 'none';
                exp.style.display = show ? '' : 'none';
                var chev = item.querySelector('.ta-pr-chev');
                if (chev) chev.style.transform = show ? 'rotate(180deg)' : '';
              }
            };
          }
        } else {
          // No applied principles yet — show a placeholder
          var _emptyMsg = window.__taLang === 'fr'
            ? 'Les principes appliqu\u00e9s appara\u00eetront ici apr\u00e8s la r\u00e9\u00e9criture.'
            : 'Applied principles will appear here after rewriting.';
          prMirror.innerHTML = '<div style="font-size:13px;font-weight:600;padding:0 8px 6px">' +
            '<span style="color:#d9b53c">\u2728</span> ' +
            (window.__taLang === 'fr' ? 'Principes appliqu\u00e9s' : 'Applied principles') +
            '</div>' +
            '<div style="padding:8px 12px;font-size:12px;color:#999;font-style:italic">' + _emptyMsg + '</div>';
          prMirror.removeAttribute('data-pr-fp');
        }
      }
    }

    // Hide any remaining in-grid duplicates (React re-creates on re-render)
    var inGridTM = grid.querySelectorAll('[data-testid="button-toggle-details"]');
    for (var t = 0; t < inGridTM.length; t++) {
      var wrapper = inGridTM[t].closest('.border-t');
      if (wrapper) wrapper.style.display = 'none';
    }
    var inGridPR = grid.querySelectorAll('[data-testid="button-toggle-principles"]');
    for (var p = 0; p < inGridPR.length; p++) {
      var wrapperP = inGridPR[p].closest('.border-t');
      if (wrapperP) wrapperP.style.display = 'none';
    }
    var inGridBtn = grid.querySelectorAll('[data-testid="button-translate"]');
    for (var b = 0; b < inGridBtn.length; b++) {
      var btnWr = inGridBtn[b].closest('.border-t');
      if (btnWr) btnWr.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden;visibility:hidden;pointer-events:none;';
    }
  }

  var raf = false;
  var obs = new MutationObserver(function() {
    if (raf) return; raf = true;
    requestAnimationFrame(function() { raf = false; relocatePanels(); });
  });
  function go() {
    var r = document.getElementById('root');
    if (r) obs.observe(r, { childList: true, subtree: true });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', go);
  else go();

  // When principles data changes (style or direction switch), clear fingerprint and rebuild
  window.addEventListener('ta-principles-updated', function() {
    var prMirror = document.getElementById('ta-mirror-pr');
    if (prMirror) prMirror.removeAttribute('data-pr-fp');
    relocatePanels();
  });

  // Re-size on window resize
  window.addEventListener('resize', function() {
    var grid = document.querySelector('.grid.lg\\:grid-cols-3') || document.querySelector('[class*="lg:grid-cols-3"]');
    var row = document.getElementById(ROW_ID);
    if (grid && row) sizeGrid(grid, row);
  });
})();
</script>

<script>
// ═══ Smart paste: preserve formatting from Word/rich text ═══
(function() {
  // Allowed tags and their treatment
  var ALLOWED_BLOCK = ['p','h1','h2','h3','h4','h5','h6','ul','ol','li','blockquote','br','hr','table','thead','tbody','tr','td','th'];
  var ALLOWED_INLINE = ['b','strong','i','em','u','s','strike','sub','sup','a','span'];
  var ALL_ALLOWED = ALLOWED_BLOCK.concat(ALLOWED_INLINE);

  function cleanWordHtml(html) {
    // 1. Extract just the body content if it's a full document
    var bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
    if (bodyMatch) html = bodyMatch[1];
    // Also handle StartFragment/EndFragment markers from clipboard
    var fragMatch = html.match(/<!--StartFragment-->([\s\S]*?)<!--EndFragment-->/);
    if (fragMatch) html = fragMatch[1];
    // 2. Remove HTML comments
    html = html.replace(/<!--[\s\S]*?-->/g, '');
    // 3. Remove <style>, <meta>, <link>, <title> blocks
    html = html.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '');
    html = html.replace(/<meta[^>]*\/?>/gi, '');
    html = html.replace(/<link[^>]*\/?>/gi, '');
    html = html.replace(/<title[^>]*>[\s\S]*?<\/title>/gi, '');
    // 4. Remove Word-specific XML namespaced tags (o:p, w:*, v:*, etc.)
    html = html.replace(/<\/?\w+:[^>]*\/?>/g, '');
    // 5. Remove all attributes except href on <a> tags
    // First, protect href: temporarily replace <a href="..."> with a placeholder
    html = html.replace(/<a\s+[^>]*href\s*=\s*["']([^"']*)["'][^>]*>/gi, '<a data-keep-href="$1">');
    // Remove all attributes from all tags
    html = html.replace(/<(\w+)\s+[^>]*>/g, '<$1>');
    // Restore href on <a> tags
    html = html.replace(/<a data-keep-href="([^"]*)"/g, '<a href="$1"');
    // 6. Remove empty spans
    html = html.replace(/<span>(.*?)<\/span>/gi, '$1');
    // 7. Replace &nbsp; with space
    html = html.replace(/&nbsp;/g, ' ');
    // 8. Clean up empty paragraphs
    html = html.replace(/<p>\s*<\/p>/gi, '');
    // 9. Remove tags not in allowed list using DOM
    var tempDiv = document.createElement('div');
    tempDiv.innerHTML = html;
    sanitizeChildren(tempDiv);
    var result = tempDiv.innerHTML;
    // 10. Collapse ALL newlines to spaces (Word visual line wraps)
    // Must run AFTER DOM serialization since innerHTML reintroduces newlines
    result = result.replace(/\r\n|\r|\n/g, ' ');
    result = result.replace(/  +/g, ' ');
    // 11. Split paragraphs at formatting boundaries
    // When a <p> starts with bold/strong and transitions to non-bold, split there
    result = splitAtFormattingBoundary(result);
    // 12. Remove empty strong/em tags
    result = result.replace(/<strong>\s*<\/strong>/g, '');
    result = result.replace(/<em>\s*<\/em>/g, '');
    result = result.replace(/<b>\s*<\/b>/g, '');
    result = result.replace(/<i>\s*<\/i>/g, '');
    // 13. Merge Word's false paragraph breaks
    result = mergeWordParagraphs(result);
    return result;
  }

  function sanitizeChildren(parent) {
    var KEEP_TAGS = {'p':1,'h1':1,'h2':1,'h3':1,'h4':1,'h5':1,'h6':1,'ul':1,'ol':1,'li':1,'blockquote':1,'br':1,'hr':1,'table':1,'thead':1,'tbody':1,'tr':1,'td':1,'th':1,'b':1,'strong':1,'i':1,'em':1,'u':1,'s':1,'strike':1,'sub':1,'sup':1,'a':1,'div':1};
    // Iterate children in reverse (safe for removal)
    var children = Array.from(parent.childNodes);
    for (var i = 0; i < children.length; i++) {
      var node = children[i];
      if (node.nodeType === 3) continue; // text nodes: keep
      if (node.nodeType !== 1) { node.remove(); continue; } // non-element: remove
      var tag = node.tagName.toLowerCase();
      // Skip script/style entirely
      if (tag === 'script' || tag === 'style') { node.remove(); continue; }
      // Rename b->strong, i->em
      if (tag === 'b') { renameTag(node, 'strong', parent); node = parent.childNodes[i]; tag = 'strong'; }
      if (tag === 'i') { renameTag(node, 'em', parent); node = parent.childNodes[i]; tag = 'em'; }
      // If tag not allowed, unwrap it (keep children, remove tag)
      if (!KEEP_TAGS[tag]) {
        unwrapNode(node);
      } else {
        // Remove all attributes except href on <a>
        if (tag === 'a') {
          var href = node.getAttribute('href');
          while (node.attributes.length > 0) node.removeAttribute(node.attributes[0].name);
          if (href) node.setAttribute('href', href);
        } else {
          while (node.attributes.length > 0) node.removeAttribute(node.attributes[0].name);
        }
        // Recurse into children
        sanitizeChildren(node);
      }
    }
  }

  function unwrapNode(node) {
    var parent = node.parentNode;
    while (node.firstChild) parent.insertBefore(node.firstChild, node);
    parent.removeChild(node);
  }

  function renameTag(node, newTag, parent) {
    var newEl = document.createElement(newTag);
    while (node.firstChild) newEl.appendChild(node.firstChild);
    parent.replaceChild(newEl, node);
  }

  function splitAtFormattingBoundary(html) {
    // When a <p> starts with <strong>/<b> content then transitions to non-bold,
    // split into separate <p> elements. This fixes Word pasting a bold headline
    // and body text into the same paragraph.
    // Works on the HTML string using regex to find <p>...</p> blocks.
    var re = /<p>([\s\S]*?)<\/p>/gi;
    var out = '';
    var lastIndex = 0;
    var m;
    while ((m = re.exec(html)) !== null) {
      // Preserve anything before this <p>
      out += html.substring(lastIndex, m.index);
      lastIndex = re.lastIndex;
      var inner = m[1];
      // Check: does this <p> start with bold content followed by non-bold?
      // Pattern: starts with <strong> or <b>, has a closing </strong> or </b>,
      // then has substantial text content after.
      var splitMatch = inner.match(
        /^(\s*<(?:strong|b)>[\s\S]*?<\/(?:strong|b)>(?:\s*<(?:strong|b)>\s*<\/(?:strong|b)>)*)\s*([A-Z\u00C0-\u00DC\u00AB\(\d])/
      );
      if (splitMatch) {
        // We have a bold prefix followed by a capital letter (start of body text)
        var boldPart = splitMatch[1].trim();
        var restStart = splitMatch[2];
        // Find the exact position where the rest starts
        var boldEndPos = inner.indexOf(restStart, boldPart.length - 1);
        if (boldEndPos > 0) {
          var beforeSplit = inner.substring(0, boldEndPos).trim();
          var afterSplit = inner.substring(boldEndPos).trim();
          // Only split if both parts have meaningful text
          var tmpB = document.createElement('div'); tmpB.innerHTML = beforeSplit;
          var tmpA = document.createElement('div'); tmpA.innerHTML = afterSplit;
          if (tmpB.textContent.trim() && tmpA.textContent.trim()) {
            out += '<p>' + beforeSplit + '</p><p>' + afterSplit + '</p>';
            continue;
          }
        }
      }
      // No split needed
      out += m[0];
    }
    // Append trailing content
    if (lastIndex < html.length) out += html.substring(lastIndex);
    return out;
  }

  function mergeWordParagraphs(html) {
    // Work with string-based approach for reliability.
    // Split HTML into segments by <p> and </p> tags.
    // Extract text blocks, then decide which to merge.

    // Step 1: Extract all paragraph contents
    var blocks = [];
    var re = /<p[^>]*>([\s\S]*?)<\/p>/gi;
    var m;
    var lastIndex = 0;
    var nonPContent = '';
    while ((m = re.exec(html)) !== null) {
      // Capture any non-<p> content before this <p>
      if (m.index > lastIndex) {
        var between = html.substring(lastIndex, m.index).trim();
        if (between) nonPContent += between;
      }
      blocks.push({ html: m[1], fullMatch: m[0] });
      lastIndex = re.lastIndex;
    }
    // If no <p> blocks found, return as-is
    if (blocks.length === 0) return html;

    // Step 2: Merge consecutive blocks that are visual line wraps
    var merged = [];
    var current = blocks[0].html;
    for (var i = 1; i < blocks.length; i++) {
      var nextHtml = blocks[i].html;
      // Get plain text for analysis
      var tmpCur = document.createElement('div'); tmpCur.innerHTML = current;
      var tmpNext = document.createElement('div'); tmpNext.innerHTML = nextHtml;
      var curText = tmpCur.textContent.trim();
      var nextText = tmpNext.textContent.trim();

      // Empty block = real paragraph break
      if (!curText) { merged.push(current); current = nextHtml; continue; }
      if (!nextText) { merged.push(current); current = nextHtml; continue; }

      // Check for real paragraph break:
      // Current ends with terminal punctuation AND next starts with uppercase/quote/number
      var lastChar = curText.charAt(curText.length - 1);
      var endsTerminal = /[.!?\u00BB\u201D\u201C"\)\u2019;:]/.test(lastChar);
      var startsNew = /^[A-Z\u00C0-\u00DC\u00AB\u201C\u00AB"\(\d\u2022\u2013\u2014\-\*]/.test(nextText);

      // Check if current or next block is predominantly bold (heading-like)
      // If so, treat as a real paragraph break regardless of punctuation
      var curBoldText = '';
      tmpCur.querySelectorAll('strong, b').forEach(function(el) { curBoldText += el.textContent; });
      var nextBoldText = '';
      tmpNext.querySelectorAll('strong, b').forEach(function(el) { nextBoldText += el.textContent; });
      var curIsBoldBlock = curBoldText.trim().length > 0 && curBoldText.trim().length >= curText.length * 0.8;
      var nextIsBoldBlock = nextBoldText.trim().length > 0 && nextBoldText.trim().length >= nextText.length * 0.8;

      // A formatting boundary occurs when bold status changes between blocks
      var boldBoundary = (curIsBoldBlock !== nextIsBoldBlock) && (curIsBoldBlock || nextIsBoldBlock);

      if ((endsTerminal && startsNew) || boldBoundary) {
        // Real paragraph break
        merged.push(current);
        current = nextHtml;
      } else {
        // Merge: visual line wrap from Word
        current = current + ' ' + nextHtml;
      }
    }
    merged.push(current);

    // Step 3: Rebuild HTML, skipping empty paragraphs
    var out = nonPContent;
    for (var j = 0; j < merged.length; j++) {
      var content = merged[j];
      var tmp = document.createElement('div'); tmp.innerHTML = content;
      if (tmp.textContent.trim()) {
        out += '<p>' + content + '</p>';
      }
    }

    // Append any trailing non-<p> content
    if (lastIndex < html.length) {
      var trailing = html.substring(lastIndex).trim();
      if (trailing) out += trailing;
    }

    return out;
  }

  function setupPasteCleanup() {
    document.addEventListener('paste', function(e) {
      const target = e.target;
      if (!target || !target.isContentEditable) return;

      var clipboard = e.clipboardData || window.clipboardData;
      var html = clipboard.getData('text/html');
      var plain = clipboard.getData('text/plain');

      // If there's HTML content (from Word, web, etc.), use it with sanitization
      if (html && html.trim()) {
        e.preventDefault();
        var cleaned = cleanWordHtml(html);
        // If sanitization produced nothing useful, fall back to plain text
        if (!cleaned.replace(/<[^>]*>/g, '').trim()) {
          cleaned = plain.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/\r\n/g, '\n').replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>');
          cleaned = '<p>' + cleaned + '</p>';
        }
        document.execCommand('insertHTML', false, cleaned);
        target.dispatchEvent(new Event('input', { bubbles: true }));
        return;
      }

      // Plain text only (no HTML) -- handle line breaks properly
      if (plain) {
        e.preventDefault();
        var escaped = plain.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        // Normalize line endings
        escaped = escaped.replace(/\r\n/g, '\n');
        // Double newlines = paragraph breaks
        escaped = escaped.replace(/\n\n+/g, '</p><p>');
        // Single newlines = line breaks
        escaped = escaped.replace(/\n/g, '<br>');
        var htmlOut = '<p>' + escaped + '</p>';
        document.execCommand('insertHTML', false, htmlOut);
        target.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }, true);
  }

    document.addEventListener('DOMContentLoaded', setupPasteCleanup);
  } else {
    setupPasteCleanup();
  }
})();
</script>

function renderWebTermSuggestions_inPanel(panel) {
  var terms = window.__taWebTerms || [];

  var existing = panel.querySelector('.ta-web-terms');

  var container = document.createElement('div');
  container.className = 'ta-web-terms';

  var title = document.createElement('div');
  title.className = 'ta-web-terms-title';
  title.textContent = lang === 'fr' ? 'Suggestions terminologiques (Web)' : 'Web Terminology Suggestions';
  container.appendChild(title);

  var _dir = window.__taDirection || 'en-fr';
  terms.forEach(function(t) {
    var item = document.createElement('div');
    item.className = 'ta-web-term-item';

    // Source term (left side of arrow)
    var srcTerm = document.createElement('span');
    srcTerm.className = 'ta-web-term-en';
    srcTerm.textContent = (_dir === 'fr-en') ? t.fr : t.en;
    item.appendChild(srcTerm);

    var arrow = document.createElement('span');
    arrow.className = 'ta-web-term-arrow';
    arrow.textContent = '\u2192';
    item.appendChild(arrow);

    // Target term (right side of arrow)
    var tgtTerm = document.createElement('span');
    tgtTerm.className = 'ta-web-term-fr';
    tgtTerm.textContent = (_dir === 'fr-en') ? t.en : t.fr;
    item.appendChild(tgtTerm);

    if (t.source) {
      var src = document.createElement('span');
      src.className = 'ta-web-term-source';
      src.textContent = '(' + t.source + ')';
      item.appendChild(src);
    }

    container.appendChild(item);
  });

  panel.appendChild(container);
}

function renderWebTermSuggestions() {
  var webPane = document.getElementById('ta-mirror-webterms');
  if (webPane) {
    if (window.__taWebTerms && window.__taWebTerms.length > 0) {

      renderWebTermSuggestions_inPanel(webPane);
    } else {
      webPane.style.display = 'none';

}

  <div id="ta-m-install-bar" style="display:none;padding:6px 14px;flex-shrink:0">
    <button id="ta-m-install-btn" style="width:100%;padding:9px;font-size:13px;font-weight:600;border-radius:8px;border:2px solid #d4a843;background:transparent;color:#d4a843;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span id="ta-m-install-label">Install App</span>
    </button>
  </div>
  <div class="ta-m-footer">
    AI is not infallible. This tool assists but does not replace professional judgment.<br>
    <a href="https://www.textappeal.pro" style="color:inherit">www.textappeal.pro</a> · © François Couture
  </div>
</div>

<script>
// ═══ Mobile App Logic ═══
(function() {
  if (window.innerWidth >= 768) return; // Skip on desktop

  // Force-hide all desktop overlay elements that get appended to body with inline styles
  // The CSS media query alone is not enough because JS sets inline display:flex after CSS loads
  var _mobileHideStyle = document.createElement('style');
  _mobileHideStyle.textContent = '#ta-user-bar, #ta-hero-cta, #ta-lang-toggle, #ta-usage-counter, .ta-zdr-notice, #ta-upgrade-modal { display:none!important;visibility:hidden!important;height:0!important;overflow:hidden!important;pointer-events:none!important;position:absolute!important; }';
  document.head.appendChild(_mobileHideStyle);
  // Also override renderUserBar so it never shows the bar
  var _origRenderUserBar = window.renderUserBar;
  window.renderUserBar = function() {};
  // Periodically enforce hiding (JS overlay recreates these elements)
  setInterval(function() {
    ['ta-user-bar','ta-hero-cta','ta-lang-toggle','ta-usage-counter'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.cssText = 'display:none!important;height:0!important;overflow:hidden!important;';
    });
    document.querySelectorAll('.ta-zdr-notice').forEach(function(el) {
      el.style.cssText = 'display:none!important;height:0!important;overflow:hidden!important;';
    });
  }, 500);

  var dir = localStorage.getItem('ta_direction') || 'en-fr';
  var style = localStorage.getItem('ta_style') || 'textAppeal';
  var lang = localStorage.getItem('ta_lang') || 'en';

  var btnEnFr = document.getElementById('ta-m-dir-enfr');
  var btnFrEn = document.getElementById('ta-m-dir-fren');
  var inputLabel = document.getElementById('ta-m-input-label');
  var outputLabel = document.getElementById('ta-m-output-label');
  var input = document.getElementById('ta-m-input');
  var output = document.getElementById('ta-m-output');
  var translateBtn = document.getElementById('ta-m-translate');
  var styleBtns = document.querySelectorAll('.ta-m-style-btn');
  var otherRow = document.getElementById('ta-m-other-row');
  var otherInput = document.getElementById('ta-m-other-input');
  var customText = localStorage.getItem('ta_style_other') || '';
  if (otherInput) otherInput.value = customText;

  function updateLabels() {
    var _uiIsEn = (window.__taLang || 'en') === 'en';
    var _srcLang = (dir === 'en-fr') ? (_uiIsEn ? 'English' : 'anglais') : (_uiIsEn ? 'French' : 'fran\u00e7ais');
    inputLabel.textContent = (_uiIsEn ? 'Source text' : 'Texte source') + ' (' + _srcLang + ')';
    outputLabel.textContent = _uiIsEn ? 'Polished result' : 'R\u00e9sultat peaufin\u00e9';
    translateBtn.innerHTML = _uiIsEn ? 'Translate and Polish' : 'Traduire et peaufiner';
    input.placeholder = _uiIsEn ? 'Paste your text here (ideally a single paragraph)' : 'Collez votre texte ici (id\u00e9alement un seul paragraphe)';
    // Update style labels based on UI language
    var _uiEn = (window.__taLang || 'en') === 'en';
    var _targetFr = (dir === 'en-fr');
    var csi = document.getElementById('ta-m-style-csi');
    var cf = document.getElementById('ta-m-style-cf');
    var otherBtn = document.getElementById('ta-m-style-other-btn');
    csi.textContent = _uiEn ? 'Clear & Inclusive' : 'Clair et inclusif';
    cf.textContent = _uiEn
      ? (_targetFr ? 'Classical French' : 'Classical English')
      : (_targetFr ? 'Fran\u00e7ais classique' : 'Anglais classique');
    if (otherBtn) otherBtn.textContent = _uiEn ? 'Other:' : 'Autre :';
    btnEnFr.className = dir === 'en-fr' ? 'ta-m-dir-active' : '';
    btnFrEn.className = dir === 'fr-en' ? 'ta-m-dir-active' : '';
    // Update active style button
    styleBtns.forEach(function(b) {
      var s = b.getAttribute('data-style');
      b.className = 'ta-m-style-btn' + (s === style ? ' ta-m-style-active' : '') + (s === 'other' ? ' ta-m-style-other' : '');
    });
    // Show/hide other input
    if (otherRow) otherRow.style.display = style === 'other' ? '' : 'none';
  }

  btnEnFr.addEventListener('click', function() { dir = 'en-fr'; localStorage.setItem('ta_direction', dir); updateLabels(); updateMobileLoginState(); });
  btnFrEn.addEventListener('click', function() { dir = 'fr-en'; localStorage.setItem('ta_direction', dir); updateLabels(); updateMobileLoginState(); });
  styleBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      style = this.getAttribute('data-style');
      localStorage.setItem('ta_style', style);
      updateLabels();
    });
  });
  if (otherInput) {
    otherInput.addEventListener('input', function() {
      customText = this.value;
      localStorage.setItem('ta_style_other', customText);
    });
  }
  updateLabels();

  // Translate + Rewrite in one tap
  translateBtn.addEventListener('click', async function() {
    var text = input.value.trim();
    if (!text) return;

    translateBtn.disabled = true;
    var _mSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:ta-spin 0.8s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> ';
    var _mEn = (window.__taLang||'en')==='en';
    function _mPhase(msg) { translateBtn.innerHTML = _mSvg + msg; }
    _mPhase(_mEn ? 'Identifying terms...' : 'Rep\u00e9rage des termes...');
    output.innerHTML = '';
    var shareDiv0 = document.getElementById('ta-m-share');
    if (shareDiv0) shareDiv0.style.display = 'none';

    // Progressive phase updates during translation (which includes terminology pipeline)
    var _mTimers = [
      setTimeout(function() { _mPhase(_mEn ? 'Querying TERMIUM Plus...' : 'Interrogation de TERMIUM Plus...'); }, 3000),
      setTimeout(function() { _mPhase(_mEn ? 'Consulting Linguee...' : 'Consultation de Linguee...'); }, 8000),
      setTimeout(function() { _mPhase(_mEn ? 'Validating terminology...' : 'Validation terminologique...'); }, 13000),
      setTimeout(function() { _mPhase(_mEn ? 'Translating...' : 'Traduction en cours...'); }, 18000)
    ];

    try {
      // Get user token if logged in
      var token = localStorage.getItem('ta_user_token');
      var headers = { 'Content-Type': 'application/json' };
      if (token) headers['x-user-token'] = token;

      // Step 1: Translate (includes 4-step terminology pipeline on server)
      var transResp = await fetch('/api/translate', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({ text: '<p>' + text.replace(/\n/g, '</p><p>') + '</p>', direction: dir })
      });
      _mTimers.forEach(clearTimeout);
      if (!transResp.ok) {
        var err = await transResp.json().catch(function() { return { error: 'Translation failed' }; });
        throw new Error(err.error || err.message || 'Translation failed');
      }
      var transData = await transResp.json();
      var translation = transData.translation || '';

      // Update spinner for polish phase
      _mPhase(_mEn ? 'Polishing style...' : 'Polissage stylistique...');

      // Step 2: Rewrite
      var rwResp = await fetch('/api/rewrite', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({ text: translation, style: style, direction: dir, customStyleText: style === 'other' ? customText : undefined })
      });
      if (!rwResp.ok) {
        var err2 = await rwResp.json().catch(function() { return { error: 'Rewrite failed' }; });
        throw new Error(err2.error || err2.message || 'Rewrite failed');
      }
      var rwData = await rwResp.json();
      var rewritten = rwData.rewritten || translation;
      var applied = rwData.appliedPrinciples || [];

      // Show result
      output.innerHTML = '<div class="rich-text-output">' + rewritten + '</div>';

      // Show share buttons
      var shareDiv = document.getElementById('ta-m-share');
      if (shareDiv) shareDiv.style.display = '';

    } catch(e) {
      _mTimers.forEach(clearTimeout);
      output.innerHTML = '<div style="color:#ef4444;padding:8px">' + (e.message || 'An error occurred') + '</div>';
    } finally {
      _mTimers.forEach(clearTimeout);
      translateBtn.disabled = false;
      translateBtn.innerHTML = (window.__taLang||'en')==='en' ? 'Translate and Polish' : 'Traduire et peaufiner';
    }
  });

  // ── Mobile login button ──
  var mLoginBtn = document.getElementById('ta-m-login-btn');
  var mLoginLabel = document.getElementById('ta-m-login-label');

  function updateMobileLoginState() {
    var token = localStorage.getItem('ta_user_token');
    if (token) {
      // Try to get user info from the freemium system
      fetch('/api/user/me', { headers: { 'x-user-token': token } })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(d) {
          if (d && d.user) {
            mLoginLabel.textContent = d.user.displayName || d.user.email || 'Account';
            mLoginBtn.onclick = function() {
              if (confirm(dir === 'en-fr' ? 'Log out?' : 'Se d\u00e9connecter?')) {
                fetch('/api/user/logout', { method: 'POST', headers: { 'x-user-token': token } });
                localStorage.removeItem('ta_user_token');
                mLoginLabel.textContent = dir === 'en-fr' ? 'Log in' : 'Connexion';
                updateMobileLoginState();
              }
            };
          } else {
            localStorage.removeItem('ta_user_token');
            setLoggedOutState();
          }
        }).catch(function() { setLoggedOutState(); });
    } else {
      setLoggedOutState();
    }
  }

  function setLoggedOutState() {
    mLoginLabel.textContent = dir === 'en-fr' ? 'Log in' : 'Connexion';
    mLoginBtn.onclick = function() {
      // Use the desktop freemium auth modal if available
      if (window.__taFreemium && window.__taFreemium.showAuthModal) {
        window.__taFreemium.showAuthModal('login');
      } else {
        window.location.hash = '#/login';
      }
    };
  }

  updateMobileLoginState();

  // ── PWA Install button ──
  var _deferredPrompt = null;
  var _installBar = document.getElementById('ta-m-install-bar');
  var _installBtn = document.getElementById('ta-m-install-btn');
  var _installLabel = document.getElementById('ta-m-install-label');

  // Check if already installed as PWA (standalone mode)
  var _isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

  if (!_isStandalone) {
    // Android/Chrome: capture the beforeinstallprompt event
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _deferredPrompt = e;
      _installBar.style.display = '';
      _installLabel.textContent = (window.__taLang || 'en') === 'en' ? 'Install App' : 'Installer l\u2019appli';
    });

    // iOS Safari: show manual instruction (iOS doesn't fire beforeinstallprompt)
    var _isIOS = /iP(hone|od|ad)/.test(navigator.userAgent) && !window.MSStream;
    var _isSafari = /Safari/.test(navigator.userAgent) && !/CriOS|FxiOS|OPiOS|EdgiOS/.test(navigator.userAgent);
    if (_isIOS && _isSafari) {
      _installBar.style.display = '';
      _installLabel.textContent = (window.__taLang || 'en') === 'en' ? 'Add to Home Screen' : 'Ajouter \u00e0 l\u2019\u00e9cran d\u2019accueil';
    }

    _installBtn.addEventListener('click', function() {
      if (_deferredPrompt) {
        // Android: trigger native install prompt
        _deferredPrompt.prompt();
        _deferredPrompt.userChoice.then(function(choice) {
          if (choice.outcome === 'accepted') _installBar.style.display = 'none';
          _deferredPrompt = null;
        });
      } else if (_isIOS) {
        // iOS: show instruction
        var _iosMsg = (window.__taLang || 'en') === 'en'
          ? 'Tap the Share button (rectangle with arrow) at the bottom of Safari, then tap "Add to Home Screen".'
          : 'Touchez le bouton Partager (rectangle avec fl\u00e8che) en bas de Safari, puis touchez \u00ab\u00a0Ajouter \u00e0 l\u2019\u00e9cran d\u2019accueil\u00a0\u00bb.';
        alert(_iosMsg);
      }
    });
  }

  // ── Mobile UI language toggle ──
  var mLangEn = document.getElementById('ta-m-lang-en');
  var mLangFr = document.getElementById('ta-m-lang-fr');
  var uiLang = localStorage.getItem('ta_lang') || 'en';

  function updateMobileLangButtons() {
    if (uiLang === 'en') {
      mLangEn.style.background = 'hsl(var(--primary))';
      mLangEn.style.color = 'hsl(var(--primary-foreground))';
      mLangFr.style.background = 'hsl(var(--background))';
      mLangFr.style.color = 'hsl(var(--foreground))';
    } else {
      mLangFr.style.background = 'hsl(var(--primary))';
      mLangFr.style.color = 'hsl(var(--primary-foreground))';
      mLangEn.style.background = 'hsl(var(--background))';
      mLangEn.style.color = 'hsl(var(--foreground))';
    }
  }
  updateMobileLangButtons();

  mLangEn.addEventListener('click', function() {
    uiLang = 'en';
    window.__taLang = 'en';
    localStorage.setItem('ta_lang', 'en');
    updateMobileLangButtons();
    updateLabels();
    updateMobileLoginState();
  });
  mLangFr.addEventListener('click', function() {
    uiLang = 'fr';
    window.__taLang = 'fr';
    localStorage.setItem('ta_lang', 'fr');
    updateMobileLangButtons();
    updateLabels();
    updateMobileLoginState();
  });

  // ── Share / Copy handlers ──
  function getResultText() {
    var el = document.getElementById('ta-m-output');
    return el ? (el.innerText || el.textContent || '').trim() : '';
  }

  document.getElementById('ta-m-copy').addEventListener('click', function() {
    var text = getResultText();
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('ta-m-copy');
      var orig = btn.innerHTML;
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Copied';
      setTimeout(function() { btn.innerHTML = orig; }, 1500);
    });
  });

  document.getElementById('ta-m-email').addEventListener('click', function() {
    var text = getResultText();
    if (!text) return;
    var subject = encodeURIComponent('Translation via Text Appeal');
    var body = encodeURIComponent(text);
    window.location.href = 'mailto:?subject=' + subject + '&body=' + body;
  });

  document.getElementById('ta-m-sms').addEventListener('click', function() {
    var text = getResultText();
    if (!text) return;
    var body = encodeURIComponent(text);
    // iOS uses &body=, Android uses ?body=
    var sep = /iP(hone|od|ad)/.test(navigator.userAgent) ? '&' : '?';
    window.location.href = 'sms:' + sep + 'body=' + body;
  });

  document.getElementById('ta-m-whatsapp').addEventListener('click', function() {
    var text = getResultText();
    if (!text) return;
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
  });
})();
</script>

</body>
</html>
