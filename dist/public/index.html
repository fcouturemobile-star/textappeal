  window.__taLang = lang;

function __updateReactText() {
  // Update placeholder texts in textareas/contenteditable
  const L = window.__taLang;
  document.querySelectorAll('[data-testid="button-translate"]').forEach(function(btn) {
    const textNode = Array.from(btn.childNodes).find(n => n.nodeType === 3 || (n.nodeType === 1 && !n.querySelector("svg")));
    if (textNode) {
      const el = textNode.nodeType === 3 ? textNode : textNode;
      // Find the text span/node inside button
      const spans = btn.querySelectorAll("span");
      // Just update all text children that aren't SVGs
    }
    // Simpler: find last text content
    const walker = document.createTreeWalker(btn, NodeFilter.SHOW_TEXT);
    let node;
    while (node = walker.nextNode()) {
      if (node.textContent.includes("Translate") || node.textContent.includes("Traduire")) {
        node.textContent = L === "fr" ? " Traduire / Retraduire" : " Translate / Retranslate";
      }
    }
  });

  // Update section headers
  const headerMap = {
    "Paste English Here": "Collez le texte anglais ici",
    "Collez le texte anglais ici": "Collez le texte anglais ici",
    "First French Version": "Première version française",

    "Text Appeal Version": "Version plus fluide",
    "Version Text Appeal": "Version plus fluide",
    "Version plus fluide": "Version plus fluide",
    "More fluid Version": "Version plus fluide",
    "Translation Memory": "Mémoire de traduction",
    "Mémoire de traduction": "Mémoire de traduction",
    "Glossary": "Glossaire",
    "Glossaire": "Glossaire",
  };
  const headerMapEN = {
    "Collez le texte anglais ici": "Paste English Here",
    "Paste English Here": "Paste English Here",
    "Première version française": "First French Version",
    "First French Version": "First French Version",
    "Version Text Appeal": "More fluid Version",
    "Text Appeal Version": "More fluid Version",
    "Version plus fluide": "More fluid Version",
    "More fluid Version": "More fluid Version",
    "Mémoire de traduction": "Translation Memory",
    "Translation Memory": "Translation Memory",
    "Glossaire": "Glossary",
    "Glossary": "Glossary",
  };

  document.querySelectorAll("h3, h4, [class*='font-semibold'], [class*='font-medium'], [class*='text-sm']").forEach(function(el) {
    const txt = el.textContent.trim();
    if (L === "fr" && headerMap[txt]) el.textContent = headerMap[txt];
    else if (L === "en" && headerMapEN[txt]) el.textContent = headerMapEN[txt];
  });

  // Update placeholder in the input area
  document.querySelectorAll('[contenteditable="true"]').forEach(function(el) {
    if (el.dataset.placeholder) {
      if (L === "fr") {
        if (el.dataset.placeholder.includes("Paste")) el.dataset.placeholder = "Collez le texte anglais ici";
      } else {
        if (el.dataset.placeholder.includes("Collez")) el.dataset.placeholder = "Paste English Here";
      }
    }
    // Also check for placeholder attribute
    const ph = el.getAttribute("placeholder");
    if (ph) {
      if (L === "fr" && ph.includes("Paste")) el.setAttribute("placeholder", "Collez le texte anglais ici");
      else if (L === "en" && ph.includes("Collez")) el.setAttribute("placeholder", "Paste English Here");
    }
  });

  // Update "Translation will appear here" and "Refined version will appear here"
  document.querySelectorAll('[class*="text-muted"]').forEach(function(el) {
    const txt = el.textContent.trim();
    if (L === "fr") {
      if (txt === "Translation will appear here") el.textContent = "La traduction apparaîtra ici";
      if (txt === "Refined version will appear here") el.textContent = "La version améliorée apparaîtra ici";
    } else {
      if (txt === "La traduction apparaîtra ici") el.textContent = "Translation will appear here";
      if (txt === "La version améliorée apparaîtra ici") el.textContent = "Refined version will appear here";
    }
  });
}

<!-- Freemium System UI -->
<script>
(function(){
"use strict";

// ═══ State ═══
let currentUser = null;
let freemiumConfig = { freeRequestsPerMonth: 30, monthlyPriceCad: 20 };

// ═══ Token Management ═══
function getToken() { return localStorage.getItem("ta_user_token"); }
function setToken(t) { if(t) localStorage.setItem("ta_user_token", t); else localStorage.removeItem("ta_user_token"); }

// ═══ Fetch wrapper to inject user token + capture admin token ═══
const origFetch = window.fetch;
let capturedAdminToken = null;
window.fetch = function(url, opts) {
  opts = opts || {};
  const token = getToken();
  if (token && typeof url === "string" && url.startsWith("/api/")) {
    opts.headers = opts.headers || {};
    if (opts.headers instanceof Headers) {
      if (!opts.headers.has("x-user-token")) opts.headers.set("x-user-token", token);
    } else {
      if (!opts.headers["x-user-token"]) opts.headers["x-user-token"] = token;
    }
  }
  // Gate: require login for translate/rewrite
  if (window.__taRequireLogin && typeof url === "string" && (url.includes("/api/translate") || url.includes("/api/rewrite"))) {
    window.__taFreemium.showAuthModal();
    return Promise.resolve(new Response(JSON.stringify({error: "Login required"}), {status: 401, headers: {"Content-Type": "application/json"}}));
  }

  // Capture admin token from outgoing requests
  if (opts.headers && typeof url === "string" && url.startsWith("/api/admin")) {
    const at = opts.headers instanceof Headers ? opts.headers.get("x-admin-token") : opts.headers["x-admin-token"];
    if (at) capturedAdminToken = at;
  }
  return origFetch.call(this, url, opts).then(function(resp) {
    // Capture admin token from login response
    if (typeof url === "string" && url.includes("/api/admin/login") && resp.ok) {
      resp.clone().json().then(function(data) {
        if (data.token) capturedAdminToken = data.token;
      });
    }
    // Intercept 402 (limit reached) responses
    if (resp.status === 402) {
      resp.clone().json().then(function(data) {
        if (data.error === "limit_reached") {
          showUpgradeModal(data);
        }
      });
    }
    return resp;
  });
};

function getAdminToken() {
  return capturedAdminToken;
}

// ═══ Load freemium config ═══
async function loadConfig() {
  try {
    const r = await origFetch("/api/freemium-config");
    if (r.ok) freemiumConfig = await r.json();
  } catch(e) {}
}

// ═══ Check session ═══
async function checkSession() {
  const token = getToken();
  if (!token) { currentUser = null; updateUI(); return; }
  try {
    const r = await origFetch("/api/user/me", { headers: { "x-user-token": token } });
    if (r.ok) {
      currentUser = await r.json();
    } else {
      setToken(null);
      currentUser = null;
    }
  } catch(e) {
    currentUser = null;
  }
  updateUI();
}

// ═══ Auth Actions ═══
async function doRegister(email, password, name) {
  const r = await origFetch("/api/user/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password, displayName: name })
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || "Registration failed");
  setToken(data.token);
  currentUser = data.user;
  updateUI();
  return data;
}

async function doLogin(email, password) {
  const r = await origFetch("/api/user/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || "Login failed");
  setToken(data.token);
  currentUser = data.user;
  updateUI();
  return data;
}

async function doLogout() {
  const token = getToken();
  if (token) {
    try { await origFetch("/api/user/logout", { method: "POST", headers: { "x-user-token": token } }); } catch(e) {}
  }
  setToken(null);
  currentUser = null;
  updateUI();
}

async function doSubscribe() {
  const token = getToken();
  if (!token) { showAuthModal("login"); return; }
  try {
    const r = await origFetch("/api/user/subscribe", { method: "POST", headers: { "x-user-token": token, "Content-Type": "application/json" } });
    const data = await r.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      alert(data.error || "Subscription unavailable at this time");
    }
  } catch(e) {
    alert("Subscription service error: " + e.message);
  }
}

// ═══ Create / Remove UI Elements ═══
function updateUI() {
  renderUserBar();
  renderUsageCounter();
  injectAccountButton();
  renderLangToggle();
  renderCreativitySlider();
  setTimeout(__updateReactText, 600);
  // Gate: require login before allowing translate
  window.__taRequireLogin = !currentUser;
}

function renderUserBar() {
  let bar = document.getElementById("ta-user-bar");
  if (!bar) {
    bar = document.createElement("div");
    bar.id = "ta-user-bar";
    document.body.appendChild(bar);
  }

  if (currentUser) {
    const plan = currentUser.plan === "pro" ? "Pro" : currentUser.plan === "admin_free" ? "Free (Admin)" : "Free";
    const planBadge = currentUser.plan === "pro" || currentUser.plan === "admin_free"
      ? '<span class="ta-badge ta-badge-pro">' + plan + '</span>'
      : '<span class="ta-badge ta-badge-free">' + plan + '</span>';
    bar.innerHTML = '<div class="ta-user-bar-inner">' +
      '<span class="ta-user-email">' + escHtml(currentUser.email) + '</span>' +
      planBadge +
      (currentUser.plan === "free" && currentUser.subscriptionStatus !== "active"
        ? '<button class="ta-btn ta-btn-upgrade" onclick="window.__taFreemium.doSubscribe()">' + __t("upgradeTo") + ' - $' + freemiumConfig.monthlyPriceCad + ' ' + __t("cadMo") + '</button>'
        : '') +
      (currentUser.plan === "pro" && currentUser.subscriptionStatus === "active"
        ? '<button class="ta-btn ta-btn-cancel" onclick="window.__taFreemium.doCancelSubscription()" style="font-size:11px;padding:3px 8px;background:transparent;color:#64748b;border:1px solid #64748b">' + (window.__taLang === "fr" ? "Annuler l\u2019abonnement" : "Cancel subscription") + '</button>'
        : '') +
      '<button class="ta-btn ta-btn-logout" onclick="window.__taFreemium.doLogout()">' + __t("logout") + '</button>' +
      '</div>';
    bar.style.display = "flex";
  } else {
    bar.innerHTML = '<div class="ta-user-bar-inner">' +
      '<button class="ta-btn ta-btn-login" onclick="window.__taFreemium.showAuthModal(\'login\')">' + __t("logIn") + '</button>' +
      '<button class="ta-btn ta-btn-register" onclick="window.__taFreemium.showAuthModal(\'register\')">' + __t("createFreeAccount") + '</button>' +
      '</div>';
    bar.style.display = "flex";
  }
}

function renderUsageCounter() {
  let counter = document.getElementById("ta-usage-counter");
  if (!currentUser) {
    if (counter) counter.remove();
    return;
  }
  if (!counter) {
    counter = document.createElement("div");
    counter.id = "ta-usage-counter";
    document.body.appendChild(counter);
  }
  const used = currentUser.requestsThisMonth || 0;
  const limit = currentUser.freeLimit || freemiumConfig.freeRequestsPerMonth || 30;
  const isPro = currentUser.plan === "pro" || currentUser.plan === "admin_free" || currentUser.subscriptionStatus === "active";
  const pct = isPro ? 0 : Math.min(100, Math.round((used / limit) * 100));
  const barColor = pct > 80 ? "#ef4444" : pct > 50 ? "#f59e0b" : "#10b981";

  counter.innerHTML = '<div class="ta-usage-inner">' +
    '<span class="ta-usage-label">' + (isPro ? __t("proUnlimited") : used + " / " + limit + " " + __t("freeRequestsOf")) + '</span>' +
    (isPro ? '' : '<div class="ta-usage-bar"><div class="ta-usage-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>') +
    '</div>';
}

function injectAccountButton() {
  // Check if there's already a button injected into the main app area
  // We'll add it near the top of the page content area
  setTimeout(function() {
    const existing = document.getElementById("ta-hero-cta");
    if (existing) existing.remove();

    // Only show on the main page (not admin)
    if (window.location.hash.includes("/admin")) return;
    if (currentUser) return; // Already logged in, no need for CTA

    // Find the main app container (the h-[100dvh] flex-col div)
    const root = document.getElementById("root");
    if (!root) return;
    // The app container is the div with h-[100dvh]
    const appContainer = root.querySelector('[class*="100dvh"]') || root.querySelector('[class*="flex-col"]');
    if (!appContainer) return;

    const cta = document.createElement("div");
    cta.id = "ta-hero-cta";
    cta.innerHTML = '<div class="ta-hero-cta-inner">' +
      '<button class="ta-btn ta-btn-hero" onclick="window.__taFreemium.showAuthModal(\'register\')">' +
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' +
      ' ' + __t('createFreeAccount') + '</button>' +
      '<span class="ta-hero-subtitle">' + freemiumConfig.freeRequestsPerMonth + ' ' + __t('freeRequests') + ' - ' + __t('noCreditCard') + '</span>' +
      '</div>';
    // Insert inside the 100dvh container, before the header
    appContainer.insertBefore(cta, appContainer.firstChild);
  }, 500);
}

// ═══ Auth Modal ═══
function showAuthModal(mode) {
  let modal = document.getElementById("ta-auth-modal");
  if (modal) modal.remove();

  modal = document.createElement("div");
  modal.id = "ta-auth-modal";
  modal.className = "ta-modal-overlay";
  const isRegister = mode === "register";

  modal.innerHTML = '<div class="ta-modal">' +
    '<button class="ta-modal-close" onclick="this.closest(\'.ta-modal-overlay\').remove()">&times;</button>' +
    '<h2 class="ta-modal-title">' + (isRegister ? __t('createFreeAccount') : __t('logIn')) + '</h2>' +
    '<p class="ta-modal-subtitle">' + (isRegister ? freemiumConfig.freeRequestsPerMonth + " " + __t("freeRequestsPerMonth") : __t("welcomeBack")) + '</p>' +
    '<form id="ta-auth-form" onsubmit="return false;">' +
    (isRegister ? '<div class="ta-form-group"><label>' + __t('name') + '</label><input type="text" id="ta-auth-name" placeholder="' + __t('yourName') + '" autocomplete="name"></div>' : '') +
    '<div class="ta-form-group"><label>' + __t('email') + '</label><input type="email" id="ta-auth-email" placeholder="you@example.com" required autocomplete="email"></div>' +
    '<div class="ta-form-group"><label>' + __t('password') + '</label><input type="password" id="ta-auth-pass" placeholder="' + __t('minChars') + '" required minlength="6" autocomplete="' + (isRegister ? "new-password" : "current-password") + '"></div>' +
    '<div id="ta-auth-error" class="ta-auth-error" style="display:none"></div>' +
    '<button type="submit" class="ta-btn ta-btn-primary ta-btn-full" id="ta-auth-submit">' + (isRegister ? __t('createAccount') : __t('logIn')) + '</button>' +
    '</form>' +
    '<div class="ta-modal-switch">' +
    (isRegister
      ? __t('alreadyHaveAccount') + ' <a href="#" onclick="window.__taFreemium.showAuthModal(\'login\');return false;">' + __t('logInLink') + '</a>'
      : __t('noAccount') + ' <a href="#" onclick="window.__taFreemium.showAuthModal(\'register\');return false;">' + __t('createOneFree') + '</a>' +
        '<br><a href="#" onclick="window.__taFreemium.showLostPasswordModal();return false;" style="font-size:13px;color:#64748b">' + (window.__taLang === "fr" ? "Mot de passe oubli\u00e9?" : "Forgot password?") + '</a>') +
    '</div>' +
    (isRegister ? '<div class="ta-modal-upgrade-hint">' + __t('wantUnlimited') + ' <a href="#" onclick="window.__taFreemium.showAuthModal(\'register\');return false;">' + __t('subscribeToPro') + ' $' + freemiumConfig.monthlyPriceCad + ' ' + __t('cadMo') + '</a> ' + __t('subscribeAfter') + '</div>' : '') +
    '</div>';

  document.body.appendChild(modal);
  modal.querySelector("#ta-auth-email").focus();

  // Handle submit
  modal.querySelector("#ta-auth-form").addEventListener("submit", async function(ev) {
    ev.preventDefault();
    const email = modal.querySelector("#ta-auth-email").value.trim();
    const pass = modal.querySelector("#ta-auth-pass").value;
    const name = isRegister ? (modal.querySelector("#ta-auth-name")?.value?.trim() || "") : "";
    const errEl = modal.querySelector("#ta-auth-error");
    const btn = modal.querySelector("#ta-auth-submit");
    errEl.style.display = "none";
    btn.disabled = true;
    btn.textContent = __t("pleaseWait");

    try {
      if (isRegister) {
        await doRegister(email, pass, name);
      } else {
        await doLogin(email, pass);
      }
      modal.remove();
    } catch(e) {
      errEl.textContent = e.message;
      errEl.style.display = "block";
      btn.disabled = false;
      btn.textContent = isRegister ? "Create Account" : "Log In";
    }
  });

  // Close on overlay click
  modal.addEventListener("click", function(ev) {
    if (ev.target === modal) modal.remove();
  });
}

    if (!hash.includes("/admin")) { injected = false; return; }

    // Look for the admin content ("Change Admin Credentials" section)
    const allText = document.body.innerText;
    if (!allText.includes("Change Admin Credentials") && !allText.includes("LLM Configuration")) return;
    if (document.getElementById("ta-admin-sections")) return;

        '<div class="shadcn-card rounded-xl border bg-card border-card-border text-card-foreground shadow-sm" style="margin-top:16px;padding:24px">' +

async function showMembersPanel() {
  const adminToken = getAdminToken();
  if (!adminToken) { alert("Admin login required"); return; }

  let panel = document.getElementById("ta-members-content");
  if (!panel) return;
  panel.innerHTML = '<p>Loading members...</p>';

  try {
    const [membersRes, statsRes] = await Promise.all([
      origFetch("/api/admin/members", { headers: { "x-admin-token": adminToken } }),
      origFetch("/api/admin/usage-stats", { headers: { "x-admin-token": adminToken } })
    ]);

    let members = [], stats = {};
    if (membersRes.ok) members = (await membersRes.json()).members || [];
    if (statsRes.ok) stats = await statsRes.json();

    panel.innerHTML = '<h3>Member Management</h3>' +
      '<div class="ta-stats-grid">' +
      '<div class="ta-stat-card"><div class="ta-stat-num">' + (stats.totalUsers || 0) + '</div><div class="ta-stat-label">Total Users</div></div>' +
      '<div class="ta-stat-card"><div class="ta-stat-num">' + (stats.proUsers || 0) + '</div><div class="ta-stat-label">Pro/Free(Admin)</div></div>' +

      '<div class="ta-stat-card"><div class="ta-stat-num">' + (stats.monthRequests || 0) + '</div><div class="ta-stat-label">Requests This Month</div></div>' +
      '</div>' +
      '<table class="ta-members-table"><thead><tr>' +
      '<th>Email</th><th>Name</th><th>Plan</th><th>Requests</th><th>Status</th><th>Actions</th>' +
      '</tr></thead><tbody>' +
      members.map(function(m) {
        return '<tr>' +
          '<td>' + escHtml(m.email) + '</td>' +
          '<td>' + escHtml(m.display_name || '-') + '</td>' +
          '<td><select onchange="window.__taFreemium.updateMemberPlan(' + m.id + ',this.value)" class="ta-select">' +
          '<option value="free"' + (m.plan==="free"?" selected":"") + '>Free</option>' +
          '<option value="pro"' + (m.plan==="pro"?" selected":"") + '>Pro</option>' +
          '<option value="admin_free"' + (m.plan==="admin_free"?" selected":"") + '>Free (Admin Grant)</option>' +
          '</select></td>' +
          '<td>' + (m.requests_this_month || 0) + '</td>' +
          '<td>' + (m.is_active ? '<span style="color:#10b981">Active</span>' : '<span style="color:#ef4444">Disabled</span>') + '</td>' +
          '<td>' +
          '<button class="ta-btn-sm" onclick="window.__taFreemium.toggleMember(' + m.id + ',' + (m.is_active?'false':'true') + ')">' + (m.is_active ? 'Disable' : 'Enable') + '</button> ' +
          '<button class="ta-btn-sm ta-btn-danger" onclick="if(confirm(\'Delete this member?\'))window.__taFreemium.deleteMember(' + m.id + ')">Delete</button>' +
          '</td></tr>';
      }).join("") +
      '</tbody></table>';

    if (members.length === 0) {
      panel.querySelector("tbody").innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#888">No members yet. Users will appear here after they register.</td></tr>';
    }
  } catch(e) {
    panel.innerHTML = '<h3>Member Management</h3><p style="color:#ef4444">Error loading members: ' + escHtml(e.message) + '</p><p>Make sure the database is configured and tables are initialized.</p>';
  }
}

async function initDb() {
  const adminToken = getAdminToken();
  const msg = document.getElementById("ta-db-msg");
  if (msg) { msg.textContent = "Creating tables..."; msg.style.color = "#888"; }
  try {
    const r = await origFetch("/api/admin/db-init", {
      method: "POST",
      headers: { "x-admin-token": adminToken, "Content-Type": "application/json" }
    });
    const data = await r.json();
    if (msg) {
      const status = data.ok ? "Tables created successfully!" : (data.error || "Error");
      const debugInfo = data.debug ? "\n\nDIAGNOSTIC LOG:\n" + data.debug.join("\n") : "";
      msg.textContent = status + debugInfo;
      msg.style.color = data.ok ? "#10b981" : "#ef4444";
      msg.style.whiteSpace = "pre-wrap";
      msg.style.fontSize = "12px";
      msg.style.maxHeight = "300px";
      msg.style.overflowY = "auto";
    }
  } catch(e) {
    if (msg) { msg.textContent = "Error: " + e.message; msg.style.color = "#ef4444"; }
  }
}

          body: JSON.stringify({
            host: panel.querySelector("#ta-smtp-host").value,

            pass: panel.querySelector("#ta-smtp-pass").value,

// ═══ Lost Password Modal ═══
function showLostPasswordModal() {
  let modal = document.getElementById("ta-auth-modal");
  if (modal) modal.remove();

  modal = document.createElement("div");
  modal.id = "ta-auth-modal";
  modal.className = "ta-modal-overlay";
  const L = window.__taLang || "en";

  modal.innerHTML = '<div class="ta-modal">' +
    '<button class="ta-modal-close" onclick="this.closest(\'.ta-modal-overlay\').remove()">&times;</button>' +
    '<h2 class="ta-modal-title">' + (L === "fr" ? "R\u00e9initialiser le mot de passe" : "Reset Password") + '</h2>' +
    '<p class="ta-modal-subtitle">' + (L === "fr" ? "Entrez votre courriel pour recevoir un lien de r\u00e9initialisation." : "Enter your email to receive a reset link.") + '</p>' +
    '<form id="ta-reset-form" onsubmit="return false;">' +
    '<div class="ta-form-group"><label>' + __t("email") + '</label><input type="email" id="ta-reset-email" placeholder="you@example.com" required autocomplete="email"></div>' +
    '<div id="ta-reset-msg" class="ta-auth-error" style="display:none"></div>' +
    '<button type="submit" class="ta-btn ta-btn-primary ta-btn-full" id="ta-reset-submit">' + (L === "fr" ? "Envoyer le lien" : "Send Reset Link") + '</button>' +
    '</form>' +
    '<div class="ta-modal-switch">' +
    '<a href="#" onclick="window.__taFreemium.showAuthModal(\'login\');return false;">' + (L === "fr" ? "Retour \u00e0 la connexion" : "Back to login") + '</a>' +
    '</div></div>';

  document.body.appendChild(modal);
  modal.querySelector("#ta-reset-email").focus();

  modal.querySelector("#ta-reset-form").addEventListener("submit", async function(ev) {
    ev.preventDefault();
    const email = modal.querySelector("#ta-reset-email").value.trim();
    const msgEl = modal.querySelector("#ta-reset-msg");
    const btn = modal.querySelector("#ta-reset-submit");
    msgEl.style.display = "none";
    btn.disabled = true;
    btn.textContent = __t("pleaseWait");
    try {
      const r = await origFetch("/api/user/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await r.json();
      msgEl.style.display = "block";
      if (r.ok) {
        msgEl.style.color = "#10b981";
        msgEl.textContent = L === "fr" ? "Si ce courriel existe, un lien de r\u00e9initialisation a \u00e9t\u00e9 envoy\u00e9." : "If that email exists, a reset link has been sent.";
      } else {
        msgEl.style.color = "#10b981";
        msgEl.textContent = L === "fr" ? "Si ce courriel existe, un lien de r\u00e9initialisation a \u00e9t\u00e9 envoy\u00e9." : "If that email exists, a reset link has been sent.";
      }
      btn.disabled = false;
      btn.textContent = L === "fr" ? "Envoyer le lien" : "Send Reset Link";
    } catch(e) {
      msgEl.textContent = e.message;
      msgEl.style.display = "block";
      msgEl.style.color = "#ef4444";
      btn.disabled = false;
      btn.textContent = L === "fr" ? "Envoyer le lien" : "Send Reset Link";
    }
  });

  modal.addEventListener("click", function(ev) { if (ev.target === modal) modal.remove(); });
}

// ═══ Cancel Subscription ═══
async function doCancelSubscription() {
  const L = window.__taLang || "en";
  const confirmMsg = L === "fr"
    ? "\u00cates-vous s\u00fbr de vouloir annuler votre abonnement Pro? Vous conserverez l'acc\u00e8s jusqu'\u00e0 la fin de votre p\u00e9riode de facturation."
    : "Are you sure you want to cancel your Pro subscription? You will keep access until the end of your billing period.";
  if (!confirm(confirmMsg)) return;
  const token = getToken();
  if (!token) return;
  try {
    const r = await origFetch("/api/user/cancel-subscription", {
      method: "POST",
      headers: { "x-user-token": token, "Content-Type": "application/json" }
    });
    const data = await r.json();
    if (r.ok) {
      alert(L === "fr" ? "Votre abonnement a \u00e9t\u00e9 annul\u00e9. Vous conservez l'acc\u00e8s Pro jusqu'\u00e0 la fin de la p\u00e9riode." : "Your subscription has been canceled. You keep Pro access until the end of your billing period.");
      await checkSession();
    } else {
      alert(data.error || (L === "fr" ? "Erreur lors de l'annulation." : "Error canceling subscription."));
    }
  } catch(e) {
    alert(L === "fr" ? "Erreur: " + e.message : "Error: " + e.message);
  }
}

// ═══ Cumulative Results + Scrollable + Footer Message ═══
(function setupCumulativeResults() {
  // Observe the result panels and prepend new results instead of replacing
  let lastTranslation = "";
  let lastRewrite = "";

  function getFooterMessage() {
    const L = window.__taLang || "en";
    if (L === "fr") {
      return '<div class="ta-result-footer" style="margin-top:12px;padding-top:10px;border-top:1px dashed rgba(128,128,128,0.3);font-size:12px;color:#888;line-height:1.5">' +
        "N'h\u00e9sitez pas \u00e0 cliquer sur Traduire / Retraduire pour obtenir plus de propositions. L'IA n'est pas infaillible. Pour un travail plus rigoureux, contactez " +
        '<a href="mailto:fcouture@traductionsvoila.com" style="color:#3b82f6;text-decoration:underline">fcouture@traductionsvoila.com</a>.' +
        '</div>';
    } else {
      return '<div class="ta-result-footer" style="margin-top:12px;padding-top:10px;border-top:1px dashed rgba(128,128,128,0.3);font-size:12px;color:#888;line-height:1.5">' +
        'Feel free to click on Translate / Retranslate for more propositions. AI is not infallible. For a more thorough job, contact ' +
        '<a href="mailto:fcouture@voilatranslations.com" style="color:#3b82f6;text-decoration:underline">fcouture@voilatranslations.com</a>.' +
        '</div>';
    }
  }

  function makeScrollable(el) {
    if (!el) return;
    el.style.maxHeight = "300px";
    el.style.overflowY = "auto";
    el.style.scrollBehavior = "smooth";
  }

  // Monitor the two output divs
  const observer = new MutationObserver(function() {
    // First French Version panel
    const transEl = document.querySelector('[data-testid="text-first-version"]');
    if (transEl) {
      const currentHTML = transEl.innerHTML;
      if (currentHTML && currentHTML !== lastTranslation && !currentHTML.includes('ta-result-footer')) {
        // This is a new result
        const prevContent = transEl.getAttribute('data-ta-history') || '';
        const separator = prevContent ? '<hr style="border:none;border-top:1px dashed rgba(128,128,128,0.3);margin:12px 0">' : '';
        const newEntry = '<div class="ta-result-entry">' + currentHTML + getFooterMessage() + '</div>';
        transEl.innerHTML = newEntry + separator + prevContent;
        transEl.setAttribute('data-ta-history', newEntry + separator + prevContent);
        lastTranslation = currentHTML;
        makeScrollable(transEl.parentElement);
      }
    }

    // More fluid Version panel (formerly Text Appeal Version)
    const rewriteEl = document.querySelector('[data-testid="text-appeal-version"]');
    if (rewriteEl) {
      const currentHTML = rewriteEl.innerHTML;
      if (currentHTML && currentHTML !== lastRewrite && !currentHTML.includes('ta-result-footer')) {
        const prevContent = rewriteEl.getAttribute('data-ta-history') || '';
        const separator = prevContent ? '<hr style="border:none;border-top:1px dashed rgba(128,128,128,0.3);margin:12px 0">' : '';
        const newEntry = '<div class="ta-result-entry">' + currentHTML + getFooterMessage() + '</div>';
        rewriteEl.innerHTML = newEntry + separator + prevContent;
        rewriteEl.setAttribute('data-ta-history', newEntry + separator + prevContent);
        lastRewrite = currentHTML;
        makeScrollable(rewriteEl.parentElement);
      }
    }
  });

  // Start observing once DOM is ready
  function startObserving() {
    const root = document.getElementById("root");
    if (root) {
      observer.observe(root, { childList: true, subtree: true, characterData: true });
    } else {
      setTimeout(startObserving, 500);
    }
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", startObserving);
  } else {
    startObserving();
  }
})();

// ═══ Export for onclick handlers ═══
window.__taFreemium = {
  showAuthModal, doLogout, doSubscribe, showMembersPanel, showStripePanel, showDatabasePanel, showSmtpPanel,
  updateMemberPlan, toggleMember, deleteMember, initDb,
  updateUI, renderLangToggle, renderCreativitySlider, setCreativity,
  showLostPasswordModal, doCancelSubscription
};

// ═══ Initialize ═══
async function init() {
  await loadConfig();
  await checkSession();
  renderLangToggle();
  renderCreativitySlider();
  injectAdminSections();

  // Re-check on hash change (SPA navigation)
  window.addEventListener("hashchange", function() {
    updateUI();
  });

  // Update React text periodically and on DOM changes
  const _textObserver = new MutationObserver(function() {
    clearTimeout(window.__taTextTimeout);
    window.__taTextTimeout = setTimeout(__updateReactText, 300);
  });
  _textObserver.observe(document.getElementById("root") || document.body, { childList: true, subtree: true });

  // Periodically refresh usage counter
  setInterval(async function() {
    if (currentUser && getToken()) {
      try {
        const r = await origFetch("/api/user/me", { headers: { "x-user-token": getToken() } });
        if (r.ok) { currentUser = await r.json(); renderUsageCounter(); }
      } catch(e) {}
    }
  }, 60000);
}

// Wait for DOM
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}

})();
</script>

      img.style.cssText = 'width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;';
      msg.appendChild(img);
    }
    var txt = document.createElement('div');
    txt.style.cssText = 'font-size:11px;color:hsl(var(--muted-foreground));line-height:1.4;';
    txt.innerHTML = window.__taLang === 'fr'
      ? 'Pour une attention professionnelle, \xe9crivez \xe0 <a href="mailto:fcouture@traductionsvoila.com" style="color:hsl(var(--primary));text-decoration:underline;">fcouture@traductionsvoila.com</a>'
      : 'For full professional attention, contact Certified Translator <a href="mailto:fcouture@voilatranslations.com" style="color:hsl(var(--primary));text-decoration:underline;">fcouture@voilatranslations.com</a>';
    msg.appendChild(txt);
    pane.appendChild(msg);
    return pane;
  }

  function relocatePanels() {
    var grid = document.querySelector('.grid.lg\\:grid-cols-3') || document.querySelector('[class*="lg:grid-cols-3"]');
    if (!grid) return;

    // Make parent a flex-column so grid + bottom row stack
    var parent = grid.parentElement;
    if (parent) {
      parent.style.display = 'flex';
      parent.style.flexDirection = 'column';
      grid.style.flex = '1 1 0%';
      grid.style.minHeight = '0';
      grid.style.setProperty('height', 'auto', 'important');
    }

    // Find or create the bottom row
    var row = document.getElementById(ROW_ID);
    if (!row) {
      row = document.createElement('div');
      row.id = ROW_ID;
      row.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;height:200px;min-height:200px;max-height:200px;margin-top:6px;flex-shrink:0;';
      parent.insertBefore(row, grid.nextSibling);
      // Create the left pane (button + contact)
      row.appendChild(buildLeftPane());
    }

    // Move the Translate/Retranslate button into the left pane
    var btnBar = document.querySelector('[data-testid="button-translate"]');
    var btnSlot = document.getElementById('ta-btn-slot');
    if (btnBar && btnSlot && !btnSlot.contains(btnBar)) {
      // Move just the button element itself
      btnSlot.innerHTML = '';
      btnSlot.appendChild(btnBar);
    }

    // Move TM/Glossary panel
    var tmHdr = document.querySelector('[data-testid="button-toggle-details"]');
    if (tmHdr) {
      var tmPanel = tmHdr.parentElement;
      if (tmPanel && tmPanel.parentElement !== row) {
        tmPanel.style.cssText = CARD + 'overflow-y:auto;';
        var tmContent = tmPanel.querySelector('.ta-tm-glossary-content');
        if (tmContent) tmContent.style.cssText = 'flex:1 1 0%;min-height:0;overflow-y:auto;max-height:none;';
        // Insert as second child (after left pane)
        if (row.children.length >= 2) {
          row.insertBefore(tmPanel, row.children[1]);
        } else {
          row.appendChild(tmPanel);
        }
      }
    }

    // Move Principles panel
    var prHdr = document.querySelector('[data-testid="button-toggle-principles"]');
    if (prHdr) {
      var prPanel = prHdr.parentElement;
      if (prPanel && prPanel.parentElement !== row) {
        prPanel.style.cssText = CARD + 'overflow-y:auto;';
        var prContent = prPanel.querySelector('.px-3.pb-3');
        if (prContent) prContent.style.cssText = 'flex:1 1 0%;min-height:0;overflow-y:auto;max-height:none;';
        row.appendChild(prPanel);
      }
    }
  }

  var raf = false;
  var obs = new MutationObserver(function() {
    if (raf) return; raf = true;
    requestAnimationFrame(function() { raf = false; relocatePanels(); });
  });
  function go() {
    var r = document.getElementById('root');
    if (r) obs.observe(r, { childList: true, subtree: true });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', go);
  else go();
})();
</script>

<script>
// ═══ Fix: Clean up Word paste line breaks ═══
(function() {
  function setupPasteCleanup() {
    document.addEventListener('paste', function(e) {
      const target = e.target;
      // Only intercept paste on contenteditable areas (the input panel)
      if (!target || !target.isContentEditable) return;

      e.preventDefault();

      // Get plain text from clipboard
      let text = (e.clipboardData || window.clipboardData).getData('text/plain');

      // Clean up Word-style line breaks:
      // - Replace single line breaks that aren't paragraph breaks with a space
      // - Keep double line breaks (actual paragraph breaks)
      // Step 1: Normalize \r\n to \n
      text = text.replace(/\r\n/g, '\n');
      // Step 2: Preserve double newlines (paragraph breaks) by replacing with placeholder
      text = text.replace(/\n\n+/g, '\u0000PARA\u0000');
      // Step 3: Replace single newlines (Word's soft wraps) with a space
      text = text.replace(/\n/g, ' ');
      // Step 4: Restore paragraph breaks
      text = text.replace(/\u0000PARA\u0000/g, '\n\n');
      // Step 5: Clean up multiple spaces
      text = text.replace(/  +/g, ' ');

      // Insert cleaned text
      const selection = window.getSelection();
      if (selection.rangeCount) {
        const range = selection.getRangeAt(0);
        range.deleteContents();
        // Convert to HTML with proper paragraph breaks
        const paragraphs = text.split('\n\n');
        const fragment = document.createDocumentFragment();
        paragraphs.forEach(function(p, i) {
          if (i > 0) fragment.appendChild(document.createElement('br'));
          if (i > 0) fragment.appendChild(document.createElement('br'));
          fragment.appendChild(document.createTextNode(p.trim()));
        });
        range.insertNode(fragment);
        // Move cursor to end
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }

      // Trigger input event so React picks up the change
      target.dispatchEvent(new Event('input', { bubbles: true }));
    }, true);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupPasteCleanup);
  } else {
    setupPasteCleanup();
  }
})();
</script>
